<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francisco Ortuño — Diseño Web</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js">
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050505;
  color: #fff;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  height: 400vh;
  overflow-x: hidden;
}

/* ─── Escenario 3D ─── */
.scene {
  perspective: 1200px;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 2;
}

/* ─── Moneda ─── */
.coin-3d {
  width: 180px;
  height: 180px;
  transform-style: preserve-3d;
  will-change: transform;
  position: absolute;
}
.coin-face {
  position: absolute;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.coin-face.front {
  background: radial-gradient(ellipse at 35% 35%, #f9e27a 0%, #d4af37 40%, #b8962e 65%, #8b6914 100%);
  border: 3px solid #f9e27a;
  box-shadow:
    inset 0 -4px 12px rgba(0,0,0,.5),
    inset 0 4px 8px rgba(255,215,0,.3),
    0 0 30px rgba(212,175,55,.35);
  transform: rotateY(0deg);
}
.coin-face.front .rim {
  position: absolute;
  width: 170px;
  height: 170px;
  border-radius: 50%;
  border: 4px solid rgba(249,226,122,.35);
  box-shadow: inset 0 0 6px rgba(212,175,55,.4);
}
.coin-face.front .initials {
  font-family: 'Times New Roman', Georgia, serif;
  font-size: 52px;
  font-weight: 900;
  color: #d4af37;
  text-shadow:
    1px 1px 0 rgba(255,215,0,.35),
    -1px -1px 0 rgba(0,0,0,.5),
    0 0 4px rgba(139,105,20,.3);
  letter-spacing: 2px;
  z-index: 1;
}
.coin-face.back {
  background: radial-gradient(ellipse at 65% 65%, #f9e27a 0%, #d4af37 40%, #b8962e 65%, #8b6914 100%);
  border: 3px solid #f9e27a;
  box-shadow:
    inset 0 -4px 12px rgba(0,0,0,.5),
    inset 0 4px 8px rgba(255,215,0,.3),
    0 0 30px rgba(212,175,55,.35);
  transform: rotateY(180deg);
}
.coin-face.back .rim {
  position: absolute;
  width: 170px;
  height: 170px;
  border-radius: 50%;
  border: 4px solid rgba(249,226,122,.35);
  box-shadow: inset 0 0 6px rgba(212,175,55,.4);
}
.coin-face.back .star {
  font-size: 60px;
  color: #f9e27a;
  text-shadow: 0 0 8px rgba(212,175,55,.5);
  z-index: 1;
}

/* ─── Canto (20 láminas) ─── */
.coin-edge {
  position: absolute;
  width: 180px;
  height: 180px;
  top: 0; left: 0;
  transform-style: preserve-3d;
}
.edge-slice {
  position: absolute;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: radial-gradient(ellipse at 35% 35%, #c9a030, #8b6914);
  border: 1px solid #b8962e;
  box-shadow: inset 0 0 4px rgba(0,0,0,.3);
}
/* Se posicionan con translateZ vía JS */

/* ─── Hero text ─── */
.hero-text {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
  text-align: center;
  pointer-events: none;
}
.hero-title {
  font-size: clamp(2.2rem, 6vw, 5rem);
  font-weight: 800;
  letter-spacing: -.02em;
  line-height: 1.1;
}
.hero-sub {
  font-size: clamp(1rem, 2.5vw, 2rem);
  font-weight: 300;
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-top: .5rem;
  color: rgba(255,255,255,.7);
}
.hero-title .line,
.hero-sub .line {
  display: block;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
}
.hero-title .line-inner,
.hero-sub .line-inner {
  display: block;
  transform: translateY(100%);
}

/* ─── Side text (Fase 2) ─── */
.side-text {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
}
.side-text p {
  font-size: clamp(1.1rem, 2.8vw, 2.2rem);
  font-weight: 300;
  letter-spacing: .04em;
  max-width: 700px;
  text-align: center;
  padding: 0 1.5rem;
  color: rgba(255,255,255,.85);
}
.side-text .line {
  display: block;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
}
.side-text .line-inner {
  display: block;
  transform: translateY(100%);
}

/* ─── Final text (Fase 3) ─── */
.final-text {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
  text-align: center;
  pointer-events: none;
  opacity: 0;
}
.final-text h2 {
  font-size: clamp(1.6rem, 4vw, 3.5rem);
  font-weight: 700;
}
.final-text .line {
  display: block;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
}
.final-text .line-inner {
  display: block;
  transform: translateY(100%);
}

/* ─── Partículas ─── */
.particle {
  position: fixed;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: radial-gradient(circle, #f9e27a, #d4af37);
  box-shadow: 0 0 6px rgba(212,175,55,.8);
  pointer-events: none;
  z-index: 10;
  will-change: transform, opacity;
}
</style>
</head>
<body>

<!-- Escenario 3D con la moneda -->
<div class="scene" id="scene">
  <div class="coin-3d" id="coin">
    <div class="coin-face front">
      <div class="rim"></div>
      <span class="initials">FO</span>
    </div>
    <div class="coin-edge" id="coinEdge"></div>
    <div class="coin-face back">
      <div class="rim"></div>
      <span class="star">✦</span>
    </div>
  </div>
</div>

<!-- Hero text (Fase 1) -->
<div class="hero-text" id="heroText">
  <h1 class="hero-title">
    <span class="line"><span class="line-inner">FRANCISCO ORTUÑO.</span></span>
  </h1>
  <p class="hero-sub">
    <span class="line"><span class="line-inner">DISEÑO WEB REVOLUCIONADO.</span></span>
  </p>
</div>

<!-- Side text (Fase 2) -->
<div class="side-text" id="sideText">
  <p>
    <span class="line"><span class="line-inner">Desarrollo moderno y rendimiento extremo con Next.js</span></span>
  </p>
</div>

<!-- Final text (Fase 3) -->
<div class="final-text" id="finalText">
  <h2>
    <span class="line"><span class="line-inner">Soluciones digitales que generan impacto</span></span>
  </h2>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

/* ─── Construir canto de la moneda (20 láminas) ─── */
const edgeEl = document.getElementById('coinEdge');
const SLICES = 20;
for (let i = 0; i < SLICES; i++) {
  const slice = document.createElement('div');
  slice.className = 'edge-slice';
  // Apilar en eje Z: desde -z/2 hasta +z/2
  const z = (i / (SLICES - 1) - 0.5) * 18; // grosor total ~18px
  slice.style.transform = 'translateZ(' + z + 'px)';
  edgeEl.appendChild(slice);
}

const coin = document.getElementById('coin');

/* ─── Loop infinito de rotación Y superpuesto ─── */
gsap.to(coin, {
  rotationY: 360,
  duration: 8,
  repeat: -1,
  ease: 'none'
});

/* ─── FASE 1: Hero reveal (0-25%) ─── */
// Animación de entrada del texto con clip-path
gsap.to('.hero-title .line-inner', {
  y: 0,
  duration: 1.2,
  ease: 'power3.out',
  stagger: 0.2,
  scrollTrigger: {
    trigger: 'body',
    start: 'top top',
    end: '+=25%',
    scrub: 1
  }
});
gsap.to('.hero-sub .line-inner', {
  y: 0,
  duration: 1.2,
  ease: 'power3.out',
  stagger: 0.2,
  scrollTrigger: {
    trigger: 'body',
    start: 'top top',
    end: '+=25%',
    scrub: 1
  }
});

/* ─── FASE 2: Caída de la moneda (25-70%) ─── */
// La moneda cae desde el centro hasta el borde inferior, escala 1→0.85
// Rotación agresiva con múltiples keyframes para simular tambaleo real
gsap.to(coin, {
  // Se mueve desde el centro (0,0) hasta cerca del borde inferior
  y: '45vh',
  scale: 0.85,
  // Rotación X e Y con keyframes para tambaleo realista
  rotationX: 720,
  rotationY: 1080,
  ease: 'power2.in',
  scrollTrigger: {
    trigger: 'body',
    start: '25% top',
    end: '70% top',
    scrub: 1.5
  }
});

// Keyframes adicionales para tambaleo en X
gsap.to(coin, {
  rotationX: 360,
  ease: 'none',
  scrollTrigger: {
    trigger: 'body',
    start: '25% top',
    end: '40% top',
    scrub: 1
  }
});
gsap.to(coin, {
  rotationX: -180,
  rotationY: 540,
  ease: 'power1.in',
  scrollTrigger: {
    trigger: 'body',
    start: '40% top',
    end: '55% top',
    scrub: 1
  }
});
gsap.to(coin, {
  rotationX: 270,
  rotationY: 900,
  ease: 'power2.out',
  scrollTrigger: {
    trigger: 'body',
    start: '55% top',
    end: '70% top',
    scrub: 1
  }
});

// Hero text fade out + subir ligeramente
gsap.to('.hero-text', {
  opacity: 0,
  y: -40,
  ease: 'power2.out',
  scrollTrigger: {
    trigger: 'body',
    start: '25% top',
    end: '40% top',
    scrub: 1
  }
});

// Side text reveal
gsap.to('#sideText', {
  opacity: 1,
  duration: 0.5,
  scrollTrigger: {
    trigger: 'body',
    start: '35% top',
    end: '50% top',
    scrub: 1
  }
});
gsap.to('#sideText .line-inner', {
  y: 0,
  ease: 'power3.out',
  scrollTrigger: {
    trigger: 'body',
    start: '35% top',
    end: '50% top',
    scrub: 1
  }
});

/* ─── FASE 3: Impacto (70-100%) ─── */
// La moneda se estabiliza con efecto elástico
gsap.to(coin, {
  rotationX: 0,
  rotationY: 0,
  ease: 'elastic.out(1, 0.3)',
  scrollTrigger: {
    trigger: 'body',
    start: '70% top',
    end: '85% top',
    scrub: 1.5
  }
});

// Side text fade out
gsap.to('#sideText', {
  opacity: 0,
  ease: 'power2.out',
  scrollTrigger: {
    trigger: 'body',
    start: '70% top',
    end: '80% top',
    scrub: 1
  }
});

// Final text reveal
gsap.to('#finalText', {
  opacity: 1,
  duration: 0.8,
  scrollTrigger: {
    trigger: 'body',
    start: '80% top',
    end: '95% top',
    scrub: 1
  }
});
gsap.to('#finalText .line-inner', {
  y: 0,
  ease: 'power3.out',
  scrollTrigger: {
    trigger: 'body',
    start: '80% top',
    end: '95% top',
    scrub: 1
  }
});

/* ─── Partículas de impacto al 70% ─── */
ScrollTrigger.create({
  trigger: 'body',
  start: '70% top',
  end: '75% top',
  scrub: 1,
  onEnter: () => spawnParticles()
});

function spawnParticles() {
  const COUNT = 20;
  for (let i = 0; i < COUNT; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    // Posición base: centro inferior de la pantalla (donde impacta)
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight * 0.85;
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    document.body.appendChild(p);

    const angle = (i / COUNT) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
    const dist = 80 + Math.random() * 180;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;

    gsap.to(p, {
      x: dx,
      y: dy,
      scale: 0,
      opacity: 0,
      duration: 0.8 + Math.random() * 0.6,
      ease: 'power2.out',
      onComplete: () => p.remove()
    });
  }
}
</script>
</body>
</html>
