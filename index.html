<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francisco Ortuño — Diseño Web</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js">
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050505;
  color: #fff;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  height: 400vh;
  overflow-x: hidden;
}

/* ─── Escenario 3D ─── */
.scene {
  perspective: 1200px;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 0; /* detrás del texto */
}

/* ─── Sombra en el suelo (para el final) ─── */
.ground-shadow {
  position: absolute;
  width: 220px;
  height: 60px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(212,175,55,.25) 0%, transparent 70%);
  bottom: 6vh;
  opacity: 0;
  transform: scaleX(1.4);
  filter: blur(6px);
  pointer-events: none;
}

/* ─── Moneda ultra realista ─── */
.coin-3d {
  width: 200px;
  height: 200px;
  transform-style: preserve-3d;
  will-change: transform;
  position: absolute;
}

/* ─── Cara frontal ─── */
.coin-face {
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.coin-face.front {
  /* Gradiente metálico multilayered */
  background:
    radial-gradient(ellipse at 30% 28%, rgba(255,245,200,.6) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 65%, rgba(180,140,60,.4) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, #f9e27a 0%, #d4af37 30%, #b8962e 55%, #7a5c10 85%, #5a3f08 100%);
  border: 2px solid #c9a030;
  box-shadow:
    /* rim bevel */
    inset 0 -6px 16px rgba(0,0,0,.6),
    inset 0 6px 12px rgba(255,215,0,.25),
    /* outer glow */
    0 0 40px rgba(212,175,55,.3),
    0 0 80px rgba(212,175,55,.1);
  transform: rotateY(0deg);
}

/* ─── Anillo exterior elevado (rim) ─── */
.coin-face.front .rim-outer {
  position: absolute;
  width: 190px;
  height: 190px;
  border-radius: 50%;
  border: 5px solid rgba(249,226,122,.2);
  box-shadow:
    inset 0 0 10px rgba(212,175,55,.3),
    0 0 6px rgba(255,215,0,.15);
  top: 5px; left: 5px;
  pointer-events: none;
}

/* ─── Anillo interior decorativo ─── */
.coin-face.front .rim-inner {
  position: absolute;
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 2px solid rgba(180,140,60,.35);
  top: 25px; left: 25px;
  pointer-events: none;
}

/* ─── Puntos perimetrales (como monedas reales) ─── */
.coin-face.front .dots {
  position: absolute;
  width: 170px;
  height: 170px;
  border-radius: 50%;
  top: 15px; left: 15px;
  pointer-events: none;
}
.coin-face.front .dots::before {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: repeating-conic-gradient(
    rgba(249,226,122,.25) 0deg,
    rgba(249,226,122,.25) 2deg,
    transparent 2deg,
    transparent 7deg
  );
  mask: radial-gradient(circle at center, transparent 50%, #000 50%);
  -webkit-mask: radial-gradient(circle at center, transparent 50%, #000 50%);
}

/* ─── Iniciales grabadas con relieve profundo ─── */
.coin-face.front .initials {
  font-family: 'Times New Roman', Georgia, serif;
  font-size: 56px;
  font-weight: 900;
  color: #c9a030;
  z-index: 2;
  letter-spacing: 3px;
  /* relieve: luz arriba-izq, sombra abajo-der */
  text-shadow:
    0 0 4px rgba(139,105,20,.3),
    /* relieve superior */
    1px 1px 0 rgba(255,245,200,.4),
    2px 2px 0 rgba(255,245,200,.15),
    /* profundidad inferior */
    -1px -1px 0 rgba(0,0,0,.5),
    -2px -2px 0 rgba(0,0,0,.3),
    /* borde acuñado */
    0 0 8px rgba(180,140,60,.2);
  transform: translateZ(2px);
}

/* ─── Cara posterior ─── */
.coin-face.back {
  background:
    radial-gradient(ellipse at 65% 68%, rgba(255,245,200,.5) 0%, transparent 50%),
    radial-gradient(ellipse at 30% 35%, rgba(180,140,60,.35) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, #f9e27a 0%, #d4af37 30%, #b8962e 55%, #7a5c10 85%, #5a3f08 100%);
  border: 2px solid #c9a030;
  box-shadow:
    inset 0 -6px 16px rgba(0,0,0,.6),
    inset 0 6px 12px rgba(255,215,0,.25),
    0 0 40px rgba(212,175,55,.3);
  transform: rotateY(180deg);
}

.coin-face.back .rim-outer {
  position: absolute;
  width: 190px;
  height: 190px;
  border-radius: 50%;
  border: 5px solid rgba(249,226,122,.2);
  box-shadow: inset 0 0 10px rgba(212,175,55,.3);
  top: 5px; left: 5px;
  pointer-events: none;
}

.coin-face.back .rim-inner {
  position: absolute;
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 2px solid rgba(180,140,60,.35);
  top: 25px; left: 25px;
  pointer-events: none;
}

.coin-face.back .dots {
  position: absolute;
  width: 170px;
  height: 170px;
  border-radius: 50%;
  top: 15px; left: 15px;
  pointer-events: none;
}
.coin-face.back .dots::before {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: repeating-conic-gradient(
    rgba(249,226,122,.25) 0deg,
    rgba(249,226,122,.25) 2deg,
    transparent 2deg,
    transparent 7deg
  );
  mask: radial-gradient(circle at center, transparent 50%, #000 50%);
  -webkit-mask: radial-gradient(circle at center, transparent 50%, #000 50%);
}

.coin-face.back .year {
  font-family: 'Times New Roman', Georgia, serif;
  font-size: 32px;
  font-weight: 700;
  color: #c9a030;
  z-index: 2;
  text-shadow:
    1px 1px 0 rgba(255,245,200,.35),
    -1px -1px 0 rgba(0,0,0,.4);
}

/* ─── Canto con estriado (reeded edge) ─── */
.coin-edge {
  position: absolute;
  width: 200px;
  height: 200px;
  top: 0; left: 0;
  transform-style: preserve-3d;
}
.edge-slice {
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background:
    repeating-linear-gradient(
      90deg,
      #8b6914 0px,
      #c9a030 2px,
      #8b6914 4px,
      #5a3f08 5px,
      #8b6914 6px
    ),
    radial-gradient(ellipse at 50% 50%, #c9a030, #6b4f0e);
  background-blend-mode: overlay;
  border: 1px solid rgba(180,140,60,.2);
}

/* ─── Hero text ─── */
.hero-text {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
  text-align: center;
  pointer-events: none;
}
.hero-title {
  font-size: clamp(2.2rem, 6vw, 5rem);
  font-weight: 800;
  letter-spacing: -.02em;
  line-height: 1.1;
}
.hero-sub {
  font-size: clamp(1rem, 2.5vw, 2rem);
  font-weight: 300;
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-top: .5rem;
  color: rgba(255,255,255,.7);
}
.hero-title .line,
.hero-sub .line {
  display: block;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
}
.hero-title .line-inner,
.hero-sub .line-inner {
  display: block;
  transform: translateY(100%);
}

/* ─── Side text (Fase 2) ─── */
.side-text {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
}
.side-text p {
  font-size: clamp(1.1rem, 2.8vw, 2.2rem);
  font-weight: 300;
  letter-spacing: .04em;
  max-width: 700px;
  text-align: center;
  padding: 0 1.5rem;
  color: rgba(255,255,255,.85);
}
.side-text .line {
  display: block;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
}
.side-text .line-inner {
  display: block;
  transform: translateY(100%);
}

/* ─── Final text (Fase 3) ─── */
.final-text {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
  text-align: center;
  pointer-events: none;
  opacity: 0;
}
.final-text h2 {
  font-size: clamp(1.6rem, 4vw, 3.5rem);
  font-weight: 700;
}
.final-text .line {
  display: block;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
}
.final-text .line-inner {
  display: block;
  transform: translateY(100%);
}

/* ─── Footer (donde cae la moneda) ─── */
.footer {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%;
  padding: 2rem 1.5rem;
  z-index: 1;
  text-align: center;
  pointer-events: none;
  opacity: 0;
}
.footer p {
  font-size: clamp(.75rem, 1.2vw, 1rem);
  color: rgba(255,255,255,.3);
  letter-spacing: .1em;
  text-transform: uppercase;
}

/* ─── Partículas ─── */
.particle {
  position: fixed;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 10;
  will-change: transform, opacity;
}
.particle.spark {
  background: radial-gradient(circle, #fff 0%, #f9e27a 40%, #d4af37 100%);
  box-shadow: 0 0 8px rgba(212,175,55,.9), 0 0 20px rgba(212,175,55,.4);
}
.particle.shard {
  background: linear-gradient(135deg, #d4af37, #8b6914);
  border-radius: 2px;
  box-shadow: 0 0 4px rgba(212,175,55,.5);
}
</style>
</head>
<body>

<!-- Escenario 3D con la moneda -->
<div class="scene" id="scene">
  <div class="coin-3d" id="coin">
    <div class="coin-face front">
      <div class="rim-outer"></div>
      <div class="dots"></div>
      <div class="rim-inner"></div>
      <span class="initials">FO</span>
    </div>
    <div class="coin-edge" id="coinEdge"></div>
    <div class="coin-face back">
      <div class="rim-outer"></div>
      <div class="dots"></div>
      <div class="rim-inner"></div>
      <span class="year">2026</span>
    </div>
  </div>
  <div class="ground-shadow" id="groundShadow"></div>
</div>

<!-- Hero text (Fase 1) -->
<div class="hero-text" id="heroText">
  <h1 class="hero-title">
    <span class="line"><span class="line-inner">FRANCISCO ORTUÑO.</span></span>
  </h1>
  <p class="hero-sub">
    <span class="line"><span class="line-inner">DISEÑO WEB REVOLUCIONADO.</span></span>
  </p>
</div>

<!-- Side text (Fase 2) -->
<div class="side-text" id="sideText">
  <p>
    <span class="line"><span class="line-inner">Desarrollo moderno y rendimiento extremo con Next.js</span></span>
  </p>
</div>

<!-- Final text (Fase 3) -->
<div class="final-text" id="finalText">
  <h2>
    <span class="line"><span class="line-inner">Soluciones digitales que generan impacto</span></span>
  </h2>
</div>

<!-- Footer -->
<div class="footer" id="footer">
  <p>© 2026 Francisco Ortuño — Diseño Web</p>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

/* ─── Construir canto estriado de la moneda (30 láminas) ─── */
const edgeEl = document.getElementById('coinEdge');
const SLICES = 30;
const EDGE_DEPTH = 22; // grosor total en px
for (let i = 0; i < SLICES; i++) {
  const slice = document.createElement('div');
  slice.className = 'edge-slice';
  const z = (i / (SLICES - 1) - 0.5) * EDGE_DEPTH;
  slice.style.transform = 'translateZ(' + z + 'px)';
  edgeEl.appendChild(slice);
}

const coin = document.getElementById('coin');
const groundShadow = document.getElementById('groundShadow');

/* ─── Estado inicial: moneda centrada, rotación Y lenta ─── */
gsap.set(coin, {
  rotationY: 0,
  rotationX: 5,
  y: 0,
  scale: 1
});

/* ─── Loop infinito de rotación Y superpuesto ─── */
gsap.to(coin, {
  rotationY: 360,
  duration: 10,
  repeat: -1,
  ease: 'none'
});

/* ─── FASE 1: Hero reveal (0-25%) ─── */
// El texto del hero se revela con clip-path
gsap.to('.hero-title .line-inner', {
  y: 0,
  duration: 1.5,
  ease: 'power4.out',
  stagger: 0.15,
  scrollTrigger: {
    trigger: 'body',
    start: 'top top',
    end: '+=25%',
    scrub: 1.2
  }
});
gsap.to('.hero-sub .line-inner', {
  y: 0,
  duration: 1.5,
  ease: 'power4.out',
  scrollTrigger: {
    trigger: 'body',
    start: 'top top',
    end: '+=25%',
    scrub: 1.2
  }
});

/* ─── FASE 2: Caída de la moneda (25-70%) ─── */
// La moneda cae con tambaleo realista y escala progresiva
// Primer tramo: giro rápido en X
gsap.to(coin, {
  y: '20vh',
  rotationX: 540,
  rotationY: 720,
  scale: 0.95,
  ease: 'power1.in',
  scrollTrigger: {
    trigger: 'body',
    start: '25% top',
    end: '40% top',
    scrub: 1.5
  }
});

// Segundo tramo: cambia dirección de giro (tambaleo)
gsap.to(coin, {
  y: '35vh',
  rotationX: -360,
  rotationY: 1080,
  scale: 0.9,
  ease: 'power2.in',
  scrollTrigger: {
    trigger: 'body',
    start: '40% top',
    end: '55% top',
    scrub: 1.5
  }
});

// Tercer tramo: se acerca al suelo, giro más lento
gsap.to(coin, {
  y: '50vh',
  rotationX: 180,
  rotationY: 1440,
  scale: 0.85,
  ease: 'power3.in',
  scrollTrigger: {
    trigger: 'body',
    start: '55% top',
    end: '70% top',
    scrub: 1.5
  }
});

// Hero text fade out + subir
gsap.to('.hero-text', {
  opacity: 0,
  y: -60,
  ease: 'power2.out',
  scrollTrigger: {
    trigger: 'body',
    start: '25% top',
    end: '40% top',
    scrub: 1
  }
});

// Side text reveal
gsap.to('#sideText', {
  opacity: 1,
  scrollTrigger: {
    trigger: 'body',
    start: '35% top',
    end: '50% top',
    scrub: 1
  }
});
gsap.to('#sideText .line-inner', {
  y: 0,
  ease: 'power4.out',
  scrollTrigger: {
    trigger: 'body',
    start: '35% top',
    end: '50% top',
    scrub: 1
  }
});

/* ─── FASE 3: Impacto y caída al suelo (70-100%) ─── */
// La moneda cae hasta el borde inferior (como si cayera al suelo)
gsap.to(coin, {
  y: '70vh',
  scale: 0.8,
  ease: 'elastic.out(1, 0.3)',
  scrollTrigger: {
    trigger: 'body',
    start: '70% top',
    end: '85% top',
    scrub: 1.5
  }
});

// Se aplana al caer al suelo (rotationX → 80° para simular que yace en el piso)
gsap.to(coin, {
  rotationX: 80,
  rotationY: 180,
  ease: 'elastic.out(0.8, 0.25)',
  scrollTrigger: {
    trigger: 'body',
    start: '78% top',
    end: '92% top',
    scrub: 2
  }
});

// Sombra en el suelo aparece cuando la moneda llega abajo
gsap.to('#groundShadow', {
  opacity: 1,
  scaleX: 1.6,
  ease: 'power2.out',
  scrollTrigger: {
    trigger: 'body',
    start: '78% top',
    end: '90% top',
    scrub: 1.5
  }
});

// El loop de rotación Y se frena (lo matamos)
ScrollTrigger.create({
  trigger: 'body',
  start: '78% top',
  onEnter: () => {
    gsap.killTweensOf(coin, 'rotationY');
  }
});

// Side text fade out
gsap.to('#sideText', {
  opacity: 0,
  ease: 'power2.out',
  scrollTrigger: {
    trigger: 'body',
    start: '70% top',
    end: '80% top',
    scrub: 1
  }
});

// Final text reveal
gsap.to('#finalText', {
  opacity: 1,
  scrollTrigger: {
    trigger: 'body',
    start: '82% top',
    end: '95% top',
    scrub: 1
  }
});
gsap.to('#finalText .line-inner', {
  y: 0,
  ease: 'power4.out',
  scrollTrigger: {
    trigger: 'body',
    start: '82% top',
    end: '95% top',
    scrub: 1
  }
});

// Footer aparece
gsap.to('#footer', {
  opacity: 1,
  scrollTrigger: {
    trigger: 'body',
    start: '88% top',
    end: '100% top',
    scrub: 1
  }
});

/* ─── Partículas de impacto al 70% ─── */
ScrollTrigger.create({
  trigger: 'body',
  start: '70% top',
  end: '75% top',
  scrub: 1,
  onEnter: () => spawnParticles()
});

function spawnParticles() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.72;
  const types = ['spark', 'shard'];

  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    const type = types[Math.floor(Math.random() * types.length)];
    p.className = 'particle ' + type;
    p.style.left = (cx + (Math.random() - 0.5) * 30) + 'px';
    p.style.top = (cy + (Math.random() - 0.5) * 20) + 'px';
    p.style.width = (4 + Math.random() * 6) + 'px';
    p.style.height = (4 + Math.random() * 6) + 'px';
    document.body.appendChild(p);

    const angle = (i / 22) * Math.PI * 2 + (Math.random() - 0.5) * 0.8;
    const dist = 60 + Math.random() * 220;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 40;

    gsap.to(p, {
      x: dx,
      y: dy,
      rotation: Math.random() * 720 - 360,
      scale: 0,
      opacity: 0,
      duration: 0.7 + Math.random() * 0.8,
      ease: 'power2.out',
      onComplete: () => p.remove()
    });
  }
}
</script>
</body>
</html>
