.hero-text {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
  text-align: center;
  pointer-events: none;
}
.hero-title {
  font-size: clamp(2.2rem, 6vw, 5rem);
  font-weight: 800;
  letter-spacing: -.02em;
  line-height: 1.1;
}
.hero-sub {
  font-size: clamp(1rem, 2.5vw, 2rem);
  font-weight: 300;
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-top: .5rem;
  color: rgba(255,255,255,.7);
}
.hero-title .line, .hero-sub .line {
  display: block;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
}
.hero-title .line-inner, .hero-sub .line-inner {
  display: block;
  transform: translateY(100%);
}
.side-text {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
}
.side-text p {
  font-size: clamp(1.1rem, 2.8vw, 2.2rem);
  font-weight: 300;
  letter-spacing: .04em;
  max-width: 700px;
  text-align: center;
  padding: 0 1.5rem;
  color: rgba(255,255,255,.85);
}
.side-text .line {
  display: block;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
}
.side-text .line-inner {
  display: block;
  transform: translateY(100%);
}
.final-text {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
  text-align: center;
  pointer-events: none;
  opacity: 0;
}
.final-text h2 {
  font-size: clamp(1.6rem, 4vw, 3.5rem);
  font-weight: 700;
}
.final-text .line {
  display: block;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
}
.final-text .line-inner {
  display: block;
  transform: translateY(100%);
}
.footer {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%;
  padding: 2rem 1.5rem;
  z-index: 1;
  text-align: center;
  pointer-events: none;
  opacity: 0;
}
.footer p {
  font-size: clamp(.75rem, 1.2vw, 1rem);
  color: rgba(255,255,255,.3);
  letter-spacing: .1em;
  text-transform: uppercase;
}
.particle {
  position: fixed;
  pointer-events: none;
  z-index: 10;
  will-change: transform, opacity;
}
.particle.spark {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff 0%, #f9e27a 40%, #d4af37 100%);
  box-shadow: 0 0 8px rgba(212,175,55,.9), 0 0 20px rgba(212,175,55,.4);
}
.particle.shard {
  width: 5px; height: 8px;
  border-radius: 1px;
  background: linear-gradient(135deg, #d4af37, #8b6914);
  box-shadow: 0 0 4px rgba(212,175,55,.5);
}
</style>
</head>
<body>

<script>
gsap.registerPlugin(ScrollTrigger);
const coin = document.getElementById('coin');
const groundShadow = document.getElementById('groundShadow');
gsap.set(coin, { rotationY: 0, rotationX: 0, y: 0, scale: 1 });
gsap.to('.hero-title .line-inner', {
  y: 0, duration: 1.5, ease: 'power4.out', stagger: 0.15,
  scrollTrigger: { trigger: 'body', start: 'top top', end: '+=25%', scrub: 1.2 }
});
gsap.to('.hero-sub .line-inner', {
  y: 0, duration: 1.5, ease: 'power4.out',
  scrollTrigger: { trigger: 'body', start: 'top top', end: '+=25%', scrub: 1.2 }
});
gsap.to(coin, {
  y: '72vh', scale: 0.76,
  rotationX: 1260, rotationY: 1800,
  ease: 'power1.in',
  scrollTrigger: { trigger: 'body', start: '25% top', end: '80% top', scrub: 2.5 }
});
gsap.to('.hero-text', {
  opacity: 0, y: -60, ease: 'power2.out',
  scrollTrigger: { trigger: 'body', start: '25% top', end: '40% top', scrub: 1 }
});
gsap.to('#sideText', {
  opacity: 1,
  scrollTrigger: { trigger: 'body', start: '35% top', end: '50% top', scrub: 1 }
});
gsap.to('#sideText .line-inner', {
  y: 0, ease: 'power4.out',
  scrollTrigger: { trigger: 'body', start: '35% top', end: '50% top', scrub: 1 }
});
gsap.to(coin, {
  rotationX: 85, rotationY: 360, ease: 'elastic.out(1,0.25)',
  scrollTrigger: { trigger: 'body', start: '80% top', end: '95% top', scrub: 2 }
});
gsap.to('#groundShadow', {
  opacity: 1, ease: 'power2.out',
  scrollTrigger: { trigger: 'body', start: '80% top', end: '92% top', scrub: 1.5 }
});
gsap.to('#sideText', {
  opacity: 0, ease: 'power2.out',
  scrollTrigger: { trigger: 'body', start: '70% top', end: '80% top', scrub: 1 }
});
gsap.to('#finalText', {
  opacity: 1,
  scrollTrigger: { trigger: 'body', start: '82% top', end: '95% top', scrub: 1 }
});
gsap.to('#finalText .line-inner', {
  y: 0, ease: 'power4.out',
  scrollTrigger: { trigger: 'body', start: '82% top', end: '95% top', scrub: 1 }
});
gsap.to('#footer', {
  opacity: 1,
  scrollTrigger: { trigger: 'body', start: '88% top', end: '100% top', scrub: 1 }
});
ScrollTrigger.create({
  trigger: 'body', start: '80% top', end: '85% top', scrub: 1,
  onEnter: () => {
    const cx = window.innerWidth/2, cy = window.innerHeight*0.8;
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle ' + (Math.random()>0.5?'spark':'shard');
      p.style.left = (cx+(Math.random()-0.5)*40)+'px';
      p.style.top = (cy+(Math.random()-0.5)*20)+'px';
      document.body.appendChild(p);
      const a = (i/20)*Math.PI*2+(Math.random()-0.5)*0.5;
      const d = 60+Math.random()*240;
      gsap.to(p, {
        x: Math.cos(a)*d, y: Math.sin(a)*d-40,
        rotation: Math.random()*720-360, scale: 0, opacity: 0,
        duration: 0.6+Math.random()*0.8, ease:'power2.out',
        onComplete: () => p.remove()
      });
    }
  }
});
</script>
