<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francisco Ortuno &mdash; Diseno Web</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js">
</script>
<script src="https://d3js.org/d3.v7.min.js">
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#fff;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;height:400vh;overflow-x:hidden}
.scene{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:0}
#globeCanvas{width:500px;height:500px;border-radius:50%;will-change:transform,clip-path;display:block;position:absolute;z-index:3;clip-path:inset(0)}
.ground-shadow-globe{position:absolute;width:340px;height:80px;border-radius:50%;background:radial-gradient(ellipse,rgba(100,180,255,.15) 0%,transparent 70%);bottom:4vh;opacity:0;filter:blur(16px);pointer-events:none;z-index:1}
.ground-shadow-coin{position:absolute;width:280px;height:70px;border-radius:50%;background:radial-gradient(ellipse,rgba(212,175,55,.25) 0%,transparent 70%);bottom:5vh;opacity:0;filter:blur(12px);pointer-events:none;z-index:1}
.coin-3d{width:280px;height:280px;transform-style:preserve-3d;will-change:transform;position:absolute;z-index:2;opacity:0}
.coin-face{position:absolute;width:280px;height:280px;border-radius:50%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;overflow:hidden}
.coin-face.front{background:radial-gradient(ellipse at 30% 28%,rgba(255,245,200,.6) 0%,transparent 50%),radial-gradient(ellipse at 70% 65%,rgba(180,140,60,.4) 0%,transparent 45%),radial-gradient(ellipse at 50% 50%,#f9e27a 0%,#d4af37 30%,#b8962e 55%,#7a5c10 85%,#5a3f08 100%);border:2px solid #c9a030;box-shadow:inset 0 -6px 16px rgba(0,0,0,.6),inset 0 6px 12px rgba(255,215,0,.25),0 0 40px rgba(212,175,55,.3),0 0 80px rgba(212,175,55,.1);transform:rotateY(0deg)}
.coin-face.front .rim{position:absolute;width:266px;height:266px;border-radius:50%;border:5px solid rgba(249,226,122,.2);box-shadow:inset 0 0 10px rgba(212,175,55,.3);top:7px;left:7px;pointer-events:none}
.coin-face.front .initials{font-family:'Times New Roman',Georgia,serif;font-size:72px;font-weight:900;color:#c9a030;z-index:2;letter-spacing:4px;text-shadow:0 0 4px rgba(139,105,20,.3),1px 1px 0 rgba(255,245,200,.4),2px 2px 0 rgba(255,245,200,.15),-1px -1px 0 rgba(0,0,0,.5),-2px -2px 0 rgba(0,0,0,.3)}
.coin-face.back{background:radial-gradient(ellipse at 65% 68%,rgba(255,245,200,.5) 0%,transparent 50%),radial-gradient(ellipse at 30% 35%,rgba(180,140,60,.35) 0%,transparent 45%),radial-gradient(ellipse at 50% 50%,#f9e27a 0%,#d4af37 30%,#b8962e 55%,#7a5c10 85%,#5a3f08 100%);border:2px solid #c9a030;box-shadow:inset 0 -6px 16px rgba(0,0,0,.6),inset 0 6px 12px rgba(255,215,0,.25),0 0 40px rgba(212,175,55,.3);transform:rotateY(180deg)}
.coin-face.back .rim{position:absolute;width:266px;height:266px;border-radius:50%;border:5px solid rgba(249,226,122,.2);box-shadow:inset 0 0 10px rgba(212,175,55,.3);top:7px;left:7px;pointer-events:none}
.coin-face.back .year{font-family:'Times New Roman',Georgia,serif;font-size:42px;font-weight:700;color:#c9a030;z-index:2;text-shadow:1px 1px 0 rgba(255,245,200,.35),-1px -1px 0 rgba(0,0,0,.4)}
.coin-edge-wrap{position:absolute;width:280px;height:280px;transform-style:preserve-3d}
.coin-edge-strip{position:absolute;width:280px;height:280px;border-radius:50%;transform:translateZ(-8px);background:repeating-linear-gradient(90deg,#5a3f08 0px,#8b6914 2px,#c9a030 3px,#8b6914 4px,#5a3f08 6px),linear-gradient(180deg,#c9a030,#6b4f0e);background-blend-mode:overlay;border:1px solid rgba(180,140,60,.2)}
.coin-edge-strip-back{position:absolute;width:280px;height:280px;border-radius:50%;transform:translateZ(8px);background:repeating-linear-gradient(90deg,#5a3f08 0px,#8b6914 2px,#c9a030 3px,#8b6914 4px,#5a3f08 6px),linear-gradient(180deg,#c9a030,#6b4f0e);background-blend-mode:overlay;border:1px solid rgba(180,140,60,.2)}
.hero-text{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;text-align:center;pointer-events:none}
.hero-title{font-size:clamp(2.2rem,6vw,5rem);font-weight:800;letter-spacing:-.02em;line-height:1.1}
.hero-sub{font-size:clamp(1rem,2.5vw,2rem);font-weight:300;letter-spacing:.15em;text-transform:uppercase;margin-top:.5rem;color:rgba(255,255,255,.7)}
.hero-title .line,.hero-sub .line{display:block;clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}
.hero-title .line-inner,.hero-sub .line-inner{display:block;transform:translateY(100%)}
.side-text{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:1;pointer-events:none;opacity:0}
.side-text p{font-size:clamp(1.1rem,2.8vw,2.2rem);font-weight:300;letter-spacing:.04em;max-width:700px;text-align:center;padding:0 1.5rem;color:rgba(255,255,255,.85)}
.side-text .line{display:block;clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}
.side-text .line-inner{display:block;transform:translateY(100%)}
.final-text{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;text-align:center;pointer-events:none;opacity:0}
.final-text h2{font-size:clamp(1.6rem,4vw,3.5rem);font-weight:700}
.final-text .line{display:block;clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}
.final-text .line-inner{display:block;transform:translateY(100%)}
.footer{position:fixed;bottom:0;left:0;width:100%;padding:2rem 1.5rem;z-index:1;text-align:center;pointer-events:none;opacity:0}
.footer p{font-size:clamp(.75rem,1.2vw,1rem);color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase}
.particle{position:fixed;pointer-events:none;z-index:10;will-change:transform,opacity}
.particle.spark{width:5px;height:5px;border-radius:50%;background:radial-gradient(circle,#fff,#6cf);box-shadow:0 0 8px rgba(100,200,255,.8)}
.particle.shard{width:4px;height:7px;border-radius:1px;background:linear-gradient(135deg,#6cf,#2080b0);box-shadow:0 0 4px rgba(100,200,255,.5)}
.particle.gold{width:6px;height:6px;border-radius:50%;background:radial-gradient(circle,#fff,#f9e27a,#d4af37);box-shadow:0 0 8px rgba(212,175,55,.9)}
</style>
</head>
<body>
<div class="scene" id="scene">
  <canvas id="globeCanvas"></canvas>
  <div class="coin-3d" id="coin">
    <div class="coin-face front">
      <div class="rim"></div>
      <span class="initials">FO</span>
    </div>
    <div class="coin-edge-wrap">
      <div class="coin-edge-strip"></div>
      <div class="coin-edge-strip-back"></div>
    </div>
    <div class="coin-face back">
      <div class="rim"></div>
      <span class="year">2026</span>
    </div>
  </div>
  <div class="ground-shadow-globe" id="groundShadowGlobe"></div>
  <div class="ground-shadow-coin" id="groundShadowCoin"></div>
</div>
<div class="hero-text" id="heroText">
  <h1 class="hero-title">
    <span class="line"><span class="line-inner">FRANCISCO ORTUNO.</span></span>
  </h1>
  <p class="hero-sub">
    <span class="line"><span class="line-inner">DISENO WEB REVOLUCIONADO.</span></span>
  </p>
</div>
<div class="side-text" id="sideText">
  <p>
    <span class="line"><span class="line-inner">Desarrollo moderno y rendimiento extremo con Next.js</span></span>
  </p>
</div>
<div class="final-text" id="finalText">
  <h2>
    <span class="line"><span class="line-inner">Soluciones digitales que generan impacto</span></span>
  </h2>
</div>
<div class="footer" id="footer">
  <p>(c) 2026 Francisco Ortuno &mdash; Diseno Web</p>
</div>
<script>
gsap.registerPlugin(ScrollTrigger);

/* ─── Globo D3 ─── */
var canvas = document.getElementById('globeCanvas');
var ctx = canvas.getContext('2d');
var W = 500, H = 500, R = 200;
canvas.width = W * 2; canvas.height = H * 2;
canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
ctx.scale(2, 2);

var projection = d3.geoOrthographic().scale(R).translate([W/2, H/2]).clipAngle(90);
var path = d3.geoPath().projection(projection).context(ctx);
var graticule = d3.geoGraticule();
var landFeatures = null;
var allDots = [];
var rotation = [0, 0];

function pointInPolygon(px, py, polygon) {
  var inside = false;
  for (var i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    var xi = polygon[i][0], yi = polygon[i][1];
    var xj = polygon[j][0], yj = polygon[j][1];
    if (yi > py !== yj > py && px < ((xj - xi) * (py - yi)) / (yj - yi) + xi) inside = !inside;
  }
  return inside;
}

function pointInFeature(lng, lat, feature) {
  var geom = feature.geometry;
  if (geom.type === 'Polygon') {
    if (!pointInPolygon(lng, lat, geom.coordinates[0])) return false;
    for (var i = 1; i < geom.coordinates.length; i++) {
      if (pointInPolygon(lng, lat, geom.coordinates[i])) return false;
    }
    return true;
  } else if (geom.type === 'MultiPolygon') {
    for (var p = 0; p < geom.coordinates.length; p++) {
      var poly = geom.coordinates[p];
      if (pointInPolygon(lng, lat, poly[0])) {
        var inHole = false;
        for (var h = 1; h < poly.length; h++) {
          if (pointInPolygon(lng, lat, poly[h])) { inHole = true; break; }
        }
        if (!inHole) return true;
      }
    }
  }
  return false;
}

function generateDots(feature, spacing) {
  var dots = [], step = spacing * 0.08;
  var bounds = d3.geoBounds(feature);
  for (var lng = bounds[0][0]; lng <= bounds[1][0]; lng += step) {
    for (var lat = bounds[0][1]; lat <= bounds[1][1]; lat += step) {
      if (pointInFeature(lng, lat, feature)) dots.push([lng, lat]);
    }
  }
  return dots;
}

function render() {
  ctx.clearRect(0, 0, W, H);
  var s = projection.scale();
  ctx.beginPath(); ctx.arc(W/2, H/2, s, 0, Math.PI*2);
  ctx.fillStyle = '#0a0a1a'; ctx.fill();
  ctx.beginPath(); ctx.arc(W/2, H/2, s, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(100,200,255,0.3)'; ctx.lineWidth = 2; ctx.stroke();
  if (landFeatures) {
    ctx.beginPath(); path(graticule());
    ctx.strokeStyle = 'rgba(100,200,255,0.12)'; ctx.lineWidth = 0.5; ctx.stroke();
    ctx.beginPath();
    landFeatures.features.forEach(function(f) { path(f); });
    ctx.strokeStyle = 'rgba(100,200,255,0.35)'; ctx.lineWidth = 1; ctx.stroke();
    var sf = s / R;
    for (var i = 0; i < allDots.length; i++) {
      var p = projection([allDots[i][0], allDots[i][1]]);
      if (p && p[0] >= 0 && p[0] <= W && p[1] >= 0 && p[1] <= H) {
        ctx.beginPath(); ctx.arc(p[0], p[1], 1.2 * sf, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(100,200,255,0.6)'; ctx.fill();
      }
    }
  }
}

function animate() {
  rotation[0] += 0.3;
  projection.rotate(rotation);
  render();
  requestAnimationFrame(animate);
}

fetch('https://raw.githubusercontent.com/martynafford/natural-earth-geojson/refs/heads/master/110m/physical/ne_110m_land.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    landFeatures = data;
    landFeatures.features.forEach(function(f) {
      var dots = generateDots(f, 16);
      dots.forEach(function(d) { allDots.push(d); });
    });
  });
animate();

/* ─── Elementos ─── */
var coin = document.getElementById('coin');
var gsGlobe = document.getElementById('groundShadowGlobe');
var gsCoin = document.getElementById('groundShadowCoin');

gsap.set(coin, { opacity:0, y:0, scale:1, rotationY:0, rotationX:0 });
gsap.set(canvas, { y:0, scale:1, clipPath:'inset(0)' });

/* ─── FASE 1: Hero (0-25%) ─── */
gsap.to('.hero-title .line-inner', { y:0, duration:1.5, ease:'power4.out', stagger:0.15, scrollTrigger:{ trigger:'body', start:'top top', end:'+=25%', scrub:1.2 } });
gsap.to('.hero-sub .line-inner', { y:0, duration:1.5, ease:'power4.out', scrollTrigger:{ trigger:'body', start:'top top', end:'+=25%', scrub:1.2 } });

/* ─── FASE 2: Transicion globo → moneda (25-55%) ─── */
// El globo se corta desde abajo (clip-path inset bottom aumenta)
gsap.to(canvas, { clipPath:'inset(0 0 100% 0)', ease:'power2.in', scrollTrigger:{ trigger:'body', start:'25% top', end:'50% top', scrub:1.5 } });

// Hero se desvanece
gsap.to('.hero-text', { opacity:0, y:-60, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'25% top', end:'40% top', scrub:1 } });

// La moneda aparece cuando el globo se corta
gsap.to(coin, { opacity:1, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'35% top', end:'50% top', scrub:1 } });

// Side text
gsap.to('#sideText', { opacity:1, scrollTrigger:{ trigger:'body', start:'35% top', end:'50% top', scrub:1 } });
gsap.to('#sideText .line-inner', { y:0, ease:'power4.out', scrollTrigger:{ trigger:'body', start:'35% top', end:'50% top', scrub:1 } });

/* ─── FASE 3: Caida de la moneda (55-80%) ─── */
// La moneda cae con rotacion
gsap.to(coin, { y:'72vh', scale:0.76, rotationX:1260, rotationY:1800, ease:'power1.in', scrollTrigger:{ trigger:'body', start:'50% top', end:'80% top', scrub:2.5 } });

// El globo se va arriba mientras la moneda cae
gsap.to(canvas, { y:'-30vh', scale:0.5, opacity:0, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'45% top', end:'60% top', scrub:1 } });

// Sombra globo
gsap.to(gsGlobe, { opacity:1, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'25% top', end:'40% top', scrub:1 } });
gsap.to(gsGlobe, { opacity:0, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'50% top', end:'65% top', scrub:1 } });

/* ─── FASE 4: Impacto (80-100%) ─── */
gsap.to(coin, { rotationX:85, rotationY:360, ease:'elastic.out(1,0.25)', scrollTrigger:{ trigger:'body', start:'80% top', end:'95% top', scrub:2 } });
gsap.to(gsCoin, { opacity:1, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'80% top', end:'92% top', scrub:1.5 } });
gsap.to('#sideText', { opacity:0, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'70% top', end:'80% top', scrub:1 } });
gsap.to('#finalText', { opacity:1, scrollTrigger:{ trigger:'body', start:'82% top', end:'95% top', scrub:1 } });
gsap.to('#finalText .line-inner', { y:0, ease:'power4.out', scrollTrigger:{ trigger:'body', start:'82% top', end:'95% top', scrub:1 } });
gsap.to('#footer', { opacity:1, scrollTrigger:{ trigger:'body', start:'88% top', end:'100% top', scrub:1 } });

/* ─── Particulas ─── */
ScrollTrigger.create({ trigger:'body', start:'80% top', end:'85% top', scrub:1, onEnter:function(){
  var cx=window.innerWidth/2, cy=window.innerHeight*0.82;
  for(var i=0;i<24;i++){
    var p=document.createElement('div');
    var t=Math.random();
    p.className='particle '+(t<0.33?'spark':t<0.66?'shard':'gold');
    p.style.left=(cx+(Math.random()-0.5)*40)+'px';
    p.style.top=(cy+(Math.random()-0.5)*20)+'px';
    document.body.appendChild(p);
    var a=(i/24)*Math.PI*2+(Math.random()-0.5)*0.5;
    var d=60+Math.random()*250;
    gsap.to(p,{ x:Math.cos(a)*d, y:Math.sin(a)*d-40, rotation:Math.random()*720-360, scale:0, opacity:0, duration:0.6+Math.random()*0.9, ease:'power2.out', onComplete:function(){p.remove()} });
  }
}});
</script>
</body>
</html>
