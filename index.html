<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francisco Ortuno &mdash; Diseno Web</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js">
</script>
<script src="https://d3js.org/d3.v7.min.js">
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;height:600vh;overflow-x:hidden}

nav{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:100;pointer-events:auto}
.nav-inner{position:relative;display:flex;border-radius:9999px;border:2px solid rgba(255,255,255,.15);background:rgba(0,0,0,.8);backdrop-filter:blur(12px);padding:4px}
.nav-item{position:relative;z-index:10;display:block;cursor:pointer;padding:6px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#fff;mix-blend-mode:difference}@media(min-width:768px){.nav-item{padding:10px 24px;font-size:14px}}
.nav-cursor{position:absolute;z-index:0;height:28px;border-radius:9999px;background:rgba(255,255,255,.9);pointer-events:none}@media(min-width:768px){.nav-cursor{height:44px}}

.scene{perspective:1400px;position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:0}

#globeCanvas{width:380px;height:380px;border-radius:50%;will-change:transform,clip-path;display:block;position:absolute;z-index:3;clip-path:inset(0);cursor:grab}
#globeCanvas:active{cursor:grabbing}

.ground-shadow-globe{position:absolute;width:300px;height:70px;border-radius:50%;background:radial-gradient(ellipse,rgba(150,150,150,.12) 0%,transparent 70%);bottom:5vh;opacity:0;filter:blur(14px);pointer-events:none;z-index:1}
.ground-shadow-coin{position:absolute;width:300px;height:70px;border-radius:50%;background:radial-gradient(ellipse,rgba(150,150,150,.2) 0%,transparent 70%);bottom:5vh;opacity:0;filter:blur(12px);pointer-events:none;z-index:1}

/* ─── MONEDA COMPACTA (2 caras + 2 bordes, sin laminas visibles) ─── */
.coin-3d{width:300px;height:300px;transform-style:preserve-3d;will-change:transform;position:absolute;z-index:2;opacity:0}
.coin-face{position:absolute;width:300px;height:300px;border-radius:50%;backface-visibility:hidden;background-size:cover;background-position:center;overflow:hidden}
.coin-face.front{box-shadow:inset 0 -4px 12px rgba(0,0,0,.5),inset 0 4px 8px rgba(255,255,255,.06),0 0 30px rgba(150,150,150,.12);transform:translateZ(-10px)}
.coin-face.back{box-shadow:inset 0 -4px 12px rgba(0,0,0,.5),inset 0 4px 8px rgba(255,255,255,.06),0 0 30px rgba(150,150,150,.12);transform:translateZ(10px) rotateY(180deg)}
.coin-edge-front{position:absolute;width:300px;height:300px;border-radius:50%;transform:translateZ(-10px);background:radial-gradient(ellipse at 50% 50%,#2a2a2a,#0a0a0a);border:1px solid rgba(100,100,100,.08)}
.coin-edge-back{position:absolute;width:300px;height:300px;border-radius:50%;transform:translateZ(10px);background:radial-gradient(ellipse at 50% 50%,#2a2a2a,#0a0a0a);border:1px solid rgba(100,100,100,.08)}

.hero-text{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;text-align:center;pointer-events:none}
.hero-websites{font-family:'Segoe UI',system-ui,sans-serif;font-size:clamp(1.8rem,5vw,3.5rem);font-weight:800;text-transform:lowercase;letter-spacing:-.02em;color:#fff;margin-bottom:.75rem;line-height:1}
.hero-websites .line{display:block;clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}
.hero-websites .line-inner{display:block;transform:translateY(100%)}
.stamp{display:inline-block;padding:28px 44px;background:#f5f5f5;position:relative;mask:radial-gradient(circle 6px at 12px 12px,transparent 6px,#000 6px) -12px -12px / 24px 24px;border-radius:4px}
.stamp-content{text-align:center}
.stamp-graphic{font-family:'Segoe UI',system-ui,sans-serif;font-size:clamp(2rem,5.5vw,4.5rem);font-weight:300;font-style:italic;color:#000;line-height:1;letter-spacing:-.01em}
.stamp-designer{font-family:'Segoe UI',system-ui,sans-serif;font-size:clamp(.9rem,2.5vw,1.8rem);font-weight:600;text-transform:uppercase;letter-spacing:.2em;color:#000;margin-top:2px}
.stamp .line{display:block;clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}
.stamp .line-inner{display:block;transform:translateY(100%)}

.side-text{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:1;pointer-events:none;opacity:0}
.side-text p{font-size:clamp(1.1rem,2.8vw,2.2rem);font-weight:300;letter-spacing:.04em;max-width:700px;text-align:center;padding:0 1.5rem;color:rgba(255,255,255,.85)}
.side-text .line{display:block;clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}
.side-text .line-inner{display:block;transform:translateY(100%)}

.cube-section{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:5;pointer-events:none;opacity:0}
.cube-wrap{width:1000px;height:562px;position:relative;overflow:hidden;border-radius:12px;box-shadow:0 0 60px rgba(255,255,255,.08),0 0 120px rgba(255,255,255,.03)}
.cube-bg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
.cube-bg img{width:100%;height:100%;object-fit:cover}
.cube-hue{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;animation:hueAnim 6s ease-in-out infinite;pointer-events:none}
.cube-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;display:flex;align-items:center;justify-content:center}
.cube-scene{width:300px;height:300px;perspective:800px;position:relative}
.cube-3d{width:300px;height:300px;position:relative;transform-style:preserve-3d;animation:cubeRotate 12s linear infinite}
.cube-3d .f{position:absolute;width:300px;height:300px;backface-visibility:hidden;overflow:hidden;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.88);border:1px solid rgba(255,255,255,.08)}
.cube-3d .f .scroll-text{white-space:nowrap;font-size:13px;line-height:1.6;color:rgba(255,255,255,.5);padding:20px;position:absolute}
.cube-3d .f .scroll-text span{color:rgba(255,255,255,.85);font-weight:600}
.cube-3d .front{transform:translateZ(150px)}
.cube-3d .back{transform:translateZ(-150px) rotateY(180deg)}
.cube-3d .back .scroll-text{animation:scrollBack 18s linear infinite}
.cube-3d .left{transform:translateX(-150px) rotateY(-90deg)}
.cube-3d .left .scroll-text{animation:scrollLeft 18s linear infinite}
.cube-3d .right{transform:translateX(150px) rotateY(90deg)}
.cube-3d .right .scroll-text{animation:scrollRight 18s linear infinite}
.cube-3d .top{transform:translateY(-150px) rotateX(90deg);background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.04)}
.cube-3d .bottom{transform:translateY(150px) rotateX(-90deg);background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.03)}

.footer{position:fixed;bottom:0;left:0;width:100%;padding:2rem 1.5rem;z-index:1;text-align:center;pointer-events:none;opacity:0}
.footer p{font-size:clamp(.75rem,1.2vw,1rem);color:rgba(255,255,255,.2);letter-spacing:.1em;text-transform:uppercase}

.particle{position:fixed;pointer-events:none;z-index:10;will-change:transform,opacity}
.particle.spark{width:5px;height:5px;border-radius:50%;background:radial-gradient(circle,#fff,#aaa);box-shadow:0 0 8px rgba(180,180,180,.6)}
.particle.shard{width:4px;height:7px;border-radius:1px;background:linear-gradient(135deg,#ccc,#666);box-shadow:0 0 4px rgba(150,150,150,.4)}

@keyframes hueAnim{0%,100%{filter:hue-rotate(-20deg)}50%{filter:hue-rotate(30deg)}}
@keyframes cubeRotate{0%{transform:rotateY(0deg) rotateX(5deg)}50%{transform:rotateY(180deg) rotateX(-5deg)}100%{transform:rotateY(360deg) rotateX(5deg)}}
@keyframes scrollLeft{0%{transform:translateX(0)}100%{transform:translateX(-5400px)}}
@keyframes scrollRight{0%{transform:translateX(0)}100%{transform:translateX(-5574px)}}
@keyframes scrollBack{0%{transform:translateX(0)}100%{transform:translateX(-5487px)}}
</style>
</head>
<body>

<nav>
  <div class="nav-inner" id="navInner">
    <div class="nav-cursor" id="navCursor"></div>
    <span class="nav-item">Home</span>
    <span class="nav-item">Pricing</span>
    <span class="nav-item">About</span>
    <span class="nav-item">Services</span>
    <span class="nav-item">Contact</span>
  </div>
</nav>

<div class="scene" id="scene">
  <canvas id="globeCanvas"></canvas>
  <div class="coin-3d" id="coin">
    <div class="coin-edge-front" id="coinEdgeFront"></div>
    <div class="coin-edge-back" id="coinEdgeBack"></div>
    <div class="coin-face front" id="coinFront"></div>
    <div class="coin-face back" id="coinBack"></div>
  </div>
  <div class="ground-shadow-globe" id="groundShadowGlobe"></div>
  <div class="ground-shadow-coin" id="groundShadowCoin"></div>
</div>

<div class="hero-text" id="heroText">
  <p class="hero-websites">
    <span class="line"><span class="line-inner">websites every</span></span>
  </p>
  <div class="stamp">
    <div class="stamp-content">
      <div class="stamp-graphic">
        <span class="line"><span class="line-inner">Graphic</span></span>
      </div>
      <div class="stamp-designer">
        <span class="line"><span class="line-inner">designer</span></span>
      </div>
    </div>
  </div>
</div>

<div class="side-text" id="sideText">
  <p><span class="line"><span class="line-inner">Desarrollo moderno y rendimiento extremo con Next.js</span></span></p>
</div>

<div class="cube-section" id="cubeSection">
  <div class="cube-wrap">
    <div class="cube-bg"><img src="https://i.ibb.co/q3XSxR9W/20250831-120144.jpg" alt="" onerror="this.style.display='none';this.parentNode.style.background='#000'"></div>
    <div class="cube-hue"></div>
    <div class="cube-overlay">
      <div class="cube-scene">
        <div class="cube-3d" id="cube3d">
          <div class="f front"></div>
          <div class="f back"><div class="scroll-text" id="textBack"></div></div>
          <div class="f left"><div class="scroll-text" id="textLeft"></div></div>
          <div class="f right"><div class="scroll-text" id="textRight"></div></div>
          <div class="f top"></div>
          <div class="f bottom"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="footer" id="footer">
  <p>(c) 2026 Francisco Ortuno &mdash; Diseno Web</p>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

var navItems = document.querySelectorAll('.nav-item');
var navCursor = document.getElementById('navCursor');
var navInner = document.getElementById('navInner');
navItems.forEach(function(item) {
  item.addEventListener('mouseenter', function() {
    var rect = this.getBoundingClientRect();
    var pr = navInner.getBoundingClientRect();
    gsap.to(navCursor, { left: rect.left - pr.left, width: rect.width, opacity: 1, duration: 0.35, ease:'power2.out' });
  });
});
navInner.addEventListener('mouseleave', function() { gsap.to(navCursor, { opacity: 0, duration: 0.25 }); });

var canvas = document.getElementById('globeCanvas');
var ctx = canvas.getContext('2d');
var W = 380, H = 380, R = 160;
var dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr; canvas.height = H * dpr;
canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
ctx.scale(dpr, dpr);

var projection = d3.geoOrthographic().scale(R).translate([W/2, H/2]).clipAngle(90);
var path = d3.geoPath().projection(projection).context(ctx);
var graticule = d3.geoGraticule();
var landFeatures = null;
var allDots = [];
var rotation = [0, 0];
var autoRotate = true;

function pointInPolygon(px, py, polygon) {
  var inside = false;
  for (var i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    var xi = polygon[i][0], yi = polygon[i][1];
    var xj = polygon[j][0], yj = polygon[j][1];
    if (yi > py !== yj > py && px < ((xj - xi) * (py - yi)) / (yj - yi) + xi) inside = !inside;
  }
  return inside;
}
function pointInFeature(lng, lat, feature) {
  var geom = feature.geometry;
  if (geom.type === 'Polygon') {
    if (!pointInPolygon(lng, lat, geom.coordinates[0])) return false;
    for (var i = 1; i < geom.coordinates.length; i++) { if (pointInPolygon(lng, lat, geom.coordinates[i])) return false; }
    return true;
  } else if (geom.type === 'MultiPolygon') {
    for (var p = 0; p < geom.coordinates.length; p++) {
      var poly = geom.coordinates[p];
      if (pointInPolygon(lng, lat, poly[0])) {
        var inHole = false;
        for (var h = 1; h < poly.length; h++) { if (pointInPolygon(lng, lat, poly[h])) { inHole = true; break; } }
        if (!inHole) return true;
      }
    }
  }
  return false;
}
function generateDots(feature, spacing) {
  var dots = [], step = spacing * 0.08;
  var bounds = d3.geoBounds(feature);
  for (var lng = bounds[0][0]; lng <= bounds[1][0]; lng += step) {
    for (var lat = bounds[0][1]; lat <= bounds[1][1]; lat += step) {
      if (pointInFeature(lng, lat, feature)) dots.push([lng, lat]);
    }
  }
  return dots;
}
function renderGlobe() {
  ctx.clearRect(0, 0, W, H);
  var s = projection.scale();
  ctx.beginPath(); ctx.arc(W/2, H/2, s, 0, Math.PI*2); ctx.fillStyle = '#0a0a0a'; ctx.fill();
  ctx.beginPath(); ctx.arc(W/2, H/2, s, 0, Math.PI*2); ctx.strokeStyle = 'rgba(180,180,180,0.15)'; ctx.lineWidth = 1.5; ctx.stroke();
  if (landFeatures) {
    ctx.beginPath(); path(graticule()); ctx.strokeStyle = 'rgba(180,180,180,0.08)'; ctx.lineWidth = 0.5; ctx.stroke();
    ctx.beginPath(); landFeatures.features.forEach(function(f) { path(f); }); ctx.strokeStyle = 'rgba(200,200,200,0.25)'; ctx.lineWidth = 0.8; ctx.stroke();
    var sf = s / R;
    for (var i = 0; i < allDots.length; i++) {
      var p = projection([allDots[i][0], allDots[i][1]]);
      if (p && p[0] >= 0 && p[0] <= W && p[1] >= 0 && p[1] <= H) {
        ctx.beginPath(); ctx.arc(p[0], p[1], 1 * sf, 0, Math.PI*2); ctx.fillStyle = 'rgba(200,200,200,0.4)'; ctx.fill();
      }
    }
  }
}
function generateMapTexture() {
  var c = document.createElement('canvas');
  c.width = 600; c.height = 600;
  var cx = c.getContext('2d');
  var pr = d3.geoOrthographic().scale(260).translate([300, 300]).clipAngle(90);
  var pa = d3.geoPath().projection(pr).context(cx);
  var g = cx.createRadialGradient(180, 180, 20, 300, 300, 260);
  g.addColorStop(0, '#1a1a1a'); g.addColorStop(0.4, '#0d0d0d'); g.addColorStop(1, '#050505');
  cx.beginPath(); cx.arc(300, 300, 260, 0, Math.PI*2); cx.fillStyle = g; cx.fill();
  cx.beginPath(); cx.arc(300, 300, 258, 0, Math.PI*2); cx.strokeStyle = 'rgba(180,180,180,0.15)'; cx.lineWidth = 2; cx.stroke();
  if (landFeatures) {
    var gr = d3.geoGraticule();
    cx.beginPath(); pa(gr()); cx.strokeStyle = 'rgba(180,180,180,0.06)'; cx.lineWidth = 0.5; cx.stroke();
    cx.beginPath(); landFeatures.features.forEach(function(f) { pa(f); }); cx.strokeStyle = 'rgba(200,200,200,0.2)'; cx.lineWidth = 1; cx.stroke();
    cx.beginPath(); landFeatures.features.forEach(function(f) { pa(f); }); cx.fillStyle = 'rgba(200,200,200,0.07)'; cx.fill();
    var dots = [];
    landFeatures.features.forEach(function(f) { var d = generateDots(f, 20); d.forEach(function(x) { dots.push(x); }); });
    for (var i = 0; i < dots.length; i++) {
      var p = pr([dots[i][0], dots[i][1]]);
      if (p && p[0] >= 0 && p[0] <= 600 && p[1] >= 0 && p[1] <= 600) {
        cx.beginPath(); cx.arc(p[0], p[1], 1.5, 0, Math.PI*2); cx.fillStyle = 'rgba(200,200,200,0.3)'; cx.fill();
      }
    }
  }
  return c.toDataURL();
}
function tick() { if (autoRotate) { rotation[0] += 0.15; projection.rotate(rotation); renderGlobe(); } requestAnimationFrame(tick); }

fetch('https://raw.githubusercontent.com/martynafford/natural-earth-geojson/refs/heads/master/110m/physical/ne_110m_land.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    landFeatures = data;
    landFeatures.features.forEach(function(f) { var dots = generateDots(f, 16); dots.forEach(function(d) { allDots.push(d); }); });
    renderGlobe();
    var tex = generateMapTexture();
    document.getElementById('coinFront').style.backgroundImage = 'url(' + tex + ')';
    document.getElementById('coinBack').style.backgroundImage = 'url(' + tex + ')';
  });
tick();

var isDragging = false, dragStartX, dragStartY, dragStartRot = [0, 0];
canvas.addEventListener('mousedown', function(e) { isDragging = true; autoRotate = false; dragStartX = e.clientX; dragStartY = e.clientY; dragStartRot = [rotation[0], rotation[1]]; });
document.addEventListener('mousemove', function(e) { if (!isDragging) return; rotation[0] = dragStartRot[0] + (e.clientX - dragStartX) * 0.5; rotation[1] = dragStartRot[1] - (e.clientY - dragStartY) * 0.5; rotation[1] = Math.max(-90, Math.min(90, rotation[1])); projection.rotate(rotation); renderGlobe(); });
document.addEventListener('mouseup', function() { isDragging = false; setTimeout(function() { autoRotate = true; }, 2000); });

var T = '  <span>Diseno Web</span> Profesional  &bull;  <span>Next.js</span> &amp; React  &bull;  <span>UI/UX</span> Moderno  &bull;  Rendimiento <span>Extremo</span>  &bull;  SEO <span>Optimizado</span>  &bull;  Diseno <span>Responsive</span>  &bull;  Animaciones <span>3D</span>  &bull;  Desarrollo <span>Front-end</span>  &bull;  Experiencia de <span>Usuario</span>  &bull;  Codigo <span>Limpio</span>  &bull;  Transformacion <span>Digital</span>  &bull;  Soluciones <span>Web</span>  &bull;  ';
document.getElementById('textLeft').innerHTML = T.repeat(20);
document.getElementById('textRight').innerHTML = T.repeat(20);
document.getElementById('textBack').innerHTML = T.repeat(20);

var coin = document.getElementById('coin');
var gsGlobe = document.getElementById('groundShadowGlobe');
var gsCoin = document.getElementById('groundShadowCoin');
var cubeSec = document.getElementById('cubeSection');

gsap.set(coin, { opacity:0, y:0, scale:1, rotationY:0, rotationX:0 });
gsap.set(canvas, { x:'30vw', y:'-5vh', scale:1, clipPath:'inset(0)', opacity:0.6 });
gsap.set(cubeSec, { opacity:0 });

gsap.to('.hero-websites .line-inner', { y:0, duration:1.2, ease:'power4.out', scrollTrigger:{ trigger:'body', start:'top top', end:'+=15%', scrub:1.2 } });
gsap.to('.stamp .line-inner', { y:0, duration:1.2, ease:'power4.out', stagger:0.1, scrollTrigger:{ trigger:'body', start:'top top', end:'+=18%', scrub:1.2 } });
gsap.to(canvas, { x:0, y:0, opacity:1, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'top top', end:'+=15%', scrub:1 } });

gsap.to(canvas, { clipPath:'inset(0 0 100% 0)', ease:'power2.in', scrollTrigger:{ trigger:'body', start:'15% top', end:'35% top', scrub:1.5 } });
gsap.to(coin, { opacity:1, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'25% top', end:'35% top', scrub:1 } });
gsap.to('.hero-text', { opacity:0, y:-60, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'15% top', end:'28% top', scrub:1 } });
gsap.to('#sideText', { opacity:1, scrollTrigger:{ trigger:'body', start:'25% top', end:'35% top', scrub:1 } });
gsap.to('#sideText .line-inner', { y:0, ease:'power4.out', scrollTrigger:{ trigger:'body', start:'25% top', end:'35% top', scrub:1 } });

gsap.to(coin, { y:'65vh', scale:0.75, rotationX:1080, rotationY:1440, ease:'power1.in', scrollTrigger:{ trigger:'body', start:'35% top', end:'70% top', scrub:2.5 } });
gsap.to(canvas, { y:'-30vh', scale:0.4, opacity:0, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'30% top', end:'45% top', scrub:1 } });
gsap.to(gsGlobe, { opacity:1, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'15% top', end:'30% top', scrub:1 } });
gsap.to(gsGlobe, { opacity:0, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'35% top', end:'50% top', scrub:1 } });

gsap.to(coin, { rotationX:85, rotationY:360, ease:'elastic.out(1,0.25)', scrollTrigger:{ trigger:'body', start:'70% top', end:'82% top', scrub:2 } });
gsap.to(gsCoin, { opacity:1, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'70% top', end:'82% top', scrub:1.5 } });
gsap.to('#sideText', { opacity:0, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'65% top', end:'75% top', scrub:1 } });

gsap.to(coin, { opacity:0, scale:0.3, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'82% top', end:'90% top', scrub:1.5 } });
gsap.to(gsCoin, { opacity:0, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'82% top', end:'90% top', scrub:1.5 } });
gsap.to(cubeSec, { opacity:1, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'85% top', end:'95% top', scrub:1.5 } });
gsap.to('#footer', { opacity:1, scrollTrigger:{ trigger:'body', start:'92% top', end:'100% top', scrub:1 } });

ScrollTrigger.create({ trigger:'body', start:'70% top', end:'75% top', scrub:1, onEnter:function(){
  var cx=window.innerWidth/2, cy=window.innerHeight*0.82;
  for(var i=0;i<20;i++){
    var p=document.createElement('div');
    p.className='particle '+(Math.random()>0.5?'spark':'shard');
    p.style.left=(cx+(Math.random()-0.5)*40)+'px';
    p.style.top=(cy+(Math.random()-0.5)*20)+'px';
    document.body.appendChild(p);
    var a=(i/20)*Math.PI*2+(Math.random()-0.5)*0.5;
    var d=60+Math.random()*250;
    gsap.to(p,{ x:Math.cos(a)*d, y:Math.sin(a)*d-40, rotation:Math.random()*720-360, scale:0, opacity:0, duration:0.6+Math.random()*0.8, ease:'power2.out', onComplete:function(){p.remove()} });
  }
}});
</script>
