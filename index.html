<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francisco Ortuno &mdash; Diseno Web</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js">
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#fff;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;height:500vh;overflow-x:hidden}

/* ─── NAV ─── */
nav{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:100;pointer-events:auto}
.nav-inner{position:relative;display:flex;border-radius:9999px;border:2px solid rgba(212,175,55,.3);background:rgba(5,5,5,.8);backdrop-filter:blur(12px);padding:4px}
.nav-item{position:relative;z-index:10;display:block;cursor:pointer;padding:6px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#fff;mix-blend-mode:difference;transition:color .2s}@media(min-width:768px){.nav-item{padding:10px 24px;font-size:14px}}
.nav-cursor{position:absolute;z-index:0;height:28px;border-radius:9999px;background:rgba(212,175,55,.9);box-shadow:0 0 20px rgba(212,175,55,.3);pointer-events:none}@media(min-width:768px){.nav-cursor{height:44px}}

.scene{perspective:1400px;position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:0}
.ground-shadow{position:absolute;width:340px;height:80px;border-radius:50%;background:radial-gradient(ellipse,rgba(212,175,55,.25) 0%,transparent 70%);bottom:5vh;opacity:0;filter:blur(14px);pointer-events:none;z-index:1}
.coin-3d{width:320px;height:320px;transform-style:preserve-3d;will-change:transform;position:absolute;z-index:2}
.coin-face{position:absolute;width:320px;height:320px;border-radius:50%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;overflow:hidden}
.coin-face.front{background:radial-gradient(ellipse at 30% 28%,rgba(255,245,200,.6) 0%,transparent 50%),radial-gradient(ellipse at 70% 65%,rgba(180,140,60,.4) 0%,transparent 45%),radial-gradient(ellipse at 50% 50%,#f9e27a 0%,#d4af37 30%,#b8962e 55%,#7a5c10 85%,#5a3f08 100%);border:2px solid #c9a030;box-shadow:inset 0 -6px 16px rgba(0,0,0,.6),inset 0 6px 12px rgba(255,215,0,.25),0 0 40px rgba(212,175,55,.3),0 0 80px rgba(212,175,55,.1);transform:translateZ(-12px)}
.coin-face.front .rim{position:absolute;width:306px;height:306px;border-radius:50%;border:5px solid rgba(249,226,122,.2);box-shadow:inset 0 0 10px rgba(212,175,55,.3);top:7px;left:7px;pointer-events:none}
.coin-face.front .rim-inner{position:absolute;width:240px;height:240px;border-radius:50%;border:2px solid rgba(180,140,60,.35);top:40px;left:40px;pointer-events:none}
.coin-face.front .dots{position:absolute;width:270px;height:270px;border-radius:50%;top:25px;left:25px;pointer-events:none}
.coin-face.front .dots::before{content:"";position:absolute;width:100%;height:100%;border-radius:50%;background:repeating-conic-gradient(rgba(249,226,122,.25) 0deg,rgba(249,226,122,.25) 2deg,transparent 2deg,transparent 7deg);mask:radial-gradient(circle at center,transparent 50%,#000 50%);-webkit-mask:radial-gradient(circle at center,transparent 50%,#000 50%)}
.coin-face.front .initials{font-family:'Times New Roman',Georgia,serif;font-size:80px;font-weight:900;color:#c9a030;z-index:2;letter-spacing:4px;text-shadow:0 0 4px rgba(139,105,20,.3),1px 1px 0 rgba(255,245,200,.4),2px 2px 0 rgba(255,245,200,.15),-1px -1px 0 rgba(0,0,0,.5),-2px -2px 0 rgba(0,0,0,.3)}
.coin-face.back{background:radial-gradient(ellipse at 65% 68%,rgba(255,245,200,.5) 0%,transparent 50%),radial-gradient(ellipse at 30% 35%,rgba(180,140,60,.35) 0%,transparent 45%),radial-gradient(ellipse at 50% 50%,#f9e27a 0%,#d4af37 30%,#b8962e 55%,#7a5c10 85%,#5a3f08 100%);border:2px solid #c9a030;box-shadow:inset 0 -6px 16px rgba(0,0,0,.6),inset 0 6px 12px rgba(255,215,0,.25),0 0 40px rgba(212,175,55,.3);transform:translateZ(12px) rotateY(180deg)}
.coin-face.back .rim{position:absolute;width:306px;height:306px;border-radius:50%;border:5px solid rgba(249,226,122,.2);box-shadow:inset 0 0 10px rgba(212,175,55,.3);top:7px;left:7px;pointer-events:none}
.coin-face.back .rim-inner{position:absolute;width:240px;height:240px;border-radius:50%;border:2px solid rgba(180,140,60,.35);top:40px;left:40px;pointer-events:none}
.coin-face.back .dots{position:absolute;width:270px;height:270px;border-radius:50%;top:25px;left:25px;pointer-events:none}
.coin-face.back .dots::before{content:"";position:absolute;width:100%;height:100%;border-radius:50%;background:repeating-conic-gradient(rgba(249,226,122,.25) 0deg,rgba(249,226,122,.25) 2deg,transparent 2deg,transparent 7deg);mask:radial-gradient(circle at center,transparent 50%,#000 50%);-webkit-mask:radial-gradient(circle at center,transparent 50%,#000 50%)}
.coin-face.back .year{font-family:'Times New Roman',Georgia,serif;font-size:48px;font-weight:700;color:#c9a030;z-index:2;text-shadow:1px 1px 0 rgba(255,245,200,.35),-1px -1px 0 rgba(0,0,0,.4)}
.hero-text{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;text-align:center;pointer-events:none}
.hero-title{font-size:clamp(2.2rem,6vw,5rem);font-weight:800;letter-spacing:-.02em;line-height:1.1;color:#d4af37}
.hero-sub{font-size:clamp(1rem,2.5vw,2rem);font-weight:300;letter-spacing:.15em;text-transform:uppercase;margin-top:.5rem;color:rgba(212,175,55,.7)}
.hero-title .line,.hero-sub .line{display:block;clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}
.hero-title .line-inner,.hero-sub .line-inner{display:block;transform:translateY(100%)}
.side-text{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:1;pointer-events:none;opacity:0}
.side-text p{font-size:clamp(1.1rem,2.8vw,2.2rem);font-weight:300;letter-spacing:.04em;max-width:700px;text-align:center;padding:0 1.5rem;color:rgba(255,255,255,.85)}
.side-text .line{display:block;clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}
.side-text .line-inner{display:block;transform:translateY(100%)}
.footer{position:fixed;bottom:0;left:0;width:100%;padding:2rem 1.5rem;z-index:1;text-align:center;pointer-events:none;opacity:0}
.footer p{font-size:clamp(.75rem,1.2vw,1rem);color:rgba(212,175,55,.3);letter-spacing:.1em;text-transform:uppercase}
.particle{position:fixed;pointer-events:none;z-index:10;will-change:transform,opacity}
.particle.spark{width:6px;height:6px;border-radius:50%;background:radial-gradient(circle,#fff 0%,#f9e27a 40%,#d4af37 100%);box-shadow:0 0 8px rgba(212,175,55,.9),0 0 20px rgba(212,175,55,.4)}
.particle.shard{width:5px;height:8px;border-radius:2px;background:linear-gradient(135deg,#d4af37,#8b6914);box-shadow:0 0 4px rgba(212,175,55,.5)}
.cube-section{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:5;pointer-events:none;opacity:0}
.cube-wrap{width:1000px;height:562px;position:relative;overflow:hidden;border-radius:12px;box-shadow:0 0 60px rgba(212,175,55,.15),0 0 120px rgba(212,175,55,.05)}
.cube-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 30% 40%,#1a0f05,#0a0505);z-index:0}
.cube-hue{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;animation:hueAnim 6s ease-in-out infinite;pointer-events:none}
.cube-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;display:flex;align-items:center;justify-content:center}
.cube-scene{width:300px;height:300px;perspective:800px;position:relative}
.cube-3d{width:300px;height:300px;position:relative;transform-style:preserve-3d;animation:cubeRotate 12s linear infinite}
.cube-3d .f{position:absolute;width:300px;height:300px;backface-visibility:hidden;overflow:hidden;display:flex;align-items:center;justify-content:center;background:rgba(10,5,5,.85);border:1px solid rgba(212,175,55,.15)}
.cube-3d .f .scroll-text{white-space:nowrap;font-size:14px;line-height:1.6;color:rgba(212,175,55,.6);padding:20px;position:absolute}
.cube-3d .f .scroll-text span{color:rgba(212,175,55,.9);font-weight:600}
.cube-3d .front{transform:translateZ(150px)}
.cube-3d .back{transform:translateZ(-150px) rotateY(180deg)}
.cube-3d .back .scroll-text{animation:scrollBack 18s linear infinite}
.cube-3d .left{transform:translateX(-150px) rotateY(-90deg)}
.cube-3d .left .scroll-text{animation:scrollLeft 18s linear infinite}
.cube-3d .right{transform:translateX(150px) rotateY(90deg)}
.cube-3d .right .scroll-text{animation:scrollRight 18s linear infinite}
.cube-3d .top{transform:translateY(-150px) rotateX(90deg);background:rgba(212,175,55,.05);border-color:rgba(212,175,55,.08)}
.cube-3d .bottom{transform:translateY(150px) rotateX(-90deg);background:rgba(212,175,55,.03);border-color:rgba(212,175,55,.05)}
@keyframes hueAnim{0%,100%{filter:hue-rotate(-20deg)}50%{filter:hue-rotate(30deg)}}
@keyframes cubeRotate{0%{transform:rotateY(0deg) rotateX(5deg)}50%{transform:rotateY(180deg) rotateX(-5deg)}100%{transform:rotateY(360deg) rotateX(5deg)}}
@keyframes scrollLeft{0%{transform:translateX(0)}100%{transform:translateX(-5400px)}}
@keyframes scrollRight{0%{transform:translateX(0)}100%{transform:translateX(-5574px)}}
@keyframes scrollBack{0%{transform:translateX(0)}100%{transform:translateX(-5487px)}}
</style>
</head>
<body>

<nav>
  <div class="nav-inner" id="navInner">
    <div class="nav-cursor" id="navCursor"></div>
    <span class="nav-item" data-tab="home">Home</span>
    <span class="nav-item" data-tab="pricing">Pricing</span>
    <span class="nav-item" data-tab="about">About</span>
    <span class="nav-item" data-tab="services">Services</span>
    <span class="nav-item" data-tab="contact">Contact</span>
  </div>
</nav>

<div class="scene" id="scene">
  <div class="coin-3d" id="coin">
    <div class="coin-face front">
      <div class="rim"></div><div class="dots"></div><div class="rim-inner"></div>
      <span class="initials">FO</span>
    </div>
    <div class="coin-edge" id="coinEdge"></div>
    <div class="coin-face back">
      <div class="rim"></div><div class="dots"></div><div class="rim-inner"></div>
      <span class="year">2026</span>
    </div>
  </div>
  <div class="ground-shadow" id="groundShadow"></div>
</div>
<div class="hero-text" id="heroText">
  <h1 class="hero-title"><span class="line"><span class="line-inner">FRANCISCO ORTUNO.</span></span></h1>
  <p class="hero-sub"><span class="line"><span class="line-inner">DISENO WEB REVOLUCIONADO.</span></span></p>
</div>
<div class="side-text" id="sideText">
  <p><span class="line"><span class="line-inner">Desarrollo moderno y rendimiento extremo con Next.js</span></span></p>
</div>
<div class="cube-section" id="cubeSection">
  <div class="cube-wrap">
    <div class="cube-bg"></div>
    <div class="cube-hue"></div>
    <div class="cube-overlay">
      <div class="cube-scene">
        <div class="cube-3d" id="cube3d">
          <div class="f front"></div>
          <div class="f back"><div class="scroll-text" id="textBack"></div></div>
          <div class="f left"><div class="scroll-text" id="textLeft"></div></div>
          <div class="f right"><div class="scroll-text" id="textRight"></div></div>
          <div class="f top"></div>
          <div class="f bottom"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="footer" id="footer">
  <p>(c) 2026 Francisco Ortuno &mdash; Diseno Web</p>
</div>
<script>
gsap.registerPlugin(ScrollTrigger);

/* ─── NAV CURSOR ─── */
var navItems = document.querySelectorAll('.nav-item');
var navCursor = document.getElementById('navCursor');
var navInner = document.getElementById('navInner');
var cursorPos = { left: 0, width: 0 };

function moveCursor(el) {
  var rect = el.getBoundingClientRect();
  var parentRect = navInner.getBoundingClientRect();
  gsap.to(navCursor, {
    left: rect.left - parentRect.left,
    width: rect.width,
    opacity: 1,
    duration: 0.35,
    ease: 'power2.out'
  });
}

navItems.forEach(function(item) {
  item.addEventListener('mouseenter', function() { moveCursor(this); });
});
navInner.addEventListener('mouseleave', function() {
  gsap.to(navCursor, { opacity: 0, duration: 0.25 });
});

/* ─── CUBE TEXT ─── */
var CUBE_TEXT = '  <span>Diseno Web</span> Profesional  &bull;  <span>Next.js</span> &amp; React  &bull;  <span>UI/UX</span> Moderno  &bull;  Rendimiento <span>Extremo</span>  &bull;  SEO <span>Optimizado</span>  &bull;  Diseno <span>Responsive</span>  &bull;  Animaciones <span>3D</span>  &bull;  Desarrollo <span>Front-end</span>  &bull;  Experiencia de <span>Usuario</span>  &bull;  Codigo <span>Limpio</span>  &bull;  Transformacion <span>Digital</span>  &bull;  Soluciones <span>Web</span>  &bull;  ';
document.getElementById('textLeft').innerHTML = CUBE_TEXT.repeat(20);
document.getElementById('textRight').innerHTML = CUBE_TEXT.repeat(20);
document.getElementById('textBack').innerHTML = CUBE_TEXT.repeat(20);

/* ─── COIN EDGE ─── */
var edgeEl = document.getElementById('coinEdge');
for (var i = 0; i < 30; i++) {
  var s = document.createElement('div');
  var z = (i / 29 - 0.5) * 24;
  s.style.cssText = 'position:absolute;width:320px;height:320px;border-radius:50%;transform:translateZ('+z+'px);background:repeating-linear-gradient(90deg,#8b6914 0px,#c9a030 2px,#8b6914 4px,#5a3f08 5px,#8b6914 6px),radial-gradient(ellipse at 50% 50%,#c9a030,#6b4f0e);background-blend-mode:overlay;border:1px solid rgba(180,140,60,.2)';
  edgeEl.appendChild(s);
}

var coin = document.getElementById('coin');
var gs = document.getElementById('groundShadow');
var cubeSec = document.getElementById('cubeSection');

gsap.set(coin, { rotationY:0, rotationX:0, y:0, scale:1 });
gsap.set(cubeSec, { opacity:0 });

gsap.to('.hero-title .line-inner', { y:0, duration:1.5, ease:'power4.out', stagger:0.15, scrollTrigger:{ trigger:'body', start:'top top', end:'+=20%', scrub:1.2 } });
gsap.to('.hero-sub .line-inner', { y:0, duration:1.5, ease:'power4.out', scrollTrigger:{ trigger:'body', start:'top top', end:'+=20%', scrub:1.2 } });
gsap.to(coin, { y:'70vh', scale:0.7, rotationX:1260, rotationY:1800, ease:'power1.in', scrollTrigger:{ trigger:'body', start:'20% top', end:'65% top', scrub:2.5 } });
gsap.to('.hero-text', { opacity:0, y:-60, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'20% top', end:'35% top', scrub:1 } });
gsap.to('#sideText', { opacity:1, scrollTrigger:{ trigger:'body', start:'30% top', end:'45% top', scrub:1 } });
gsap.to('#sideText .line-inner', { y:0, ease:'power4.out', scrollTrigger:{ trigger:'body', start:'30% top', end:'45% top', scrub:1 } });
gsap.to('#sideText', { opacity:0, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'60% top', end:'70% top', scrub:1 } });
gsap.to(coin, { rotationX:85, rotationY:360, ease:'elastic.out(1,0.25)', scrollTrigger:{ trigger:'body', start:'65% top', end:'78% top', scrub:2 } });
gsap.to(gs, { opacity:1, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'65% top', end:'78% top', scrub:1.5 } });
gsap.to(coin, { opacity:0, scale:0.3, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'78% top', end:'88% top', scrub:1.5 } });
gsap.to(gs, { opacity:0, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'78% top', end:'88% top', scrub:1.5 } });
gsap.to(cubeSec, { opacity:1, ease:'power2.out', scrollTrigger:{ trigger:'body', start:'82% top', end:'95% top', scrub:1.5 } });
gsap.to('#footer', { opacity:1, scrollTrigger:{ trigger:'body', start:'92% top', end:'100% top', scrub:1 } });

ScrollTrigger.create({ trigger:'body', start:'65% top', end:'70% top', scrub:1, onEnter:function(){
  var cx=window.innerWidth/2, cy=window.innerHeight*0.82;
  for(var i=0;i<20;i++){
    var p=document.createElement('div');
    p.className='particle '+(Math.random()>0.5?'spark':'shard');
    p.style.left=(cx+(Math.random()-0.5)*40)+'px';
    p.style.top=(cy+(Math.random()-0.5)*20)+'px';
    document.body.appendChild(p);
    var a=(i/20)*Math.PI*2+(Math.random()-0.5)*0.5;
    var d=60+Math.random()*250;
    gsap.to(p,{ x:Math.cos(a)*d, y:Math.sin(a)*d-40, rotation:Math.random()*720-360, scale:0, opacity:0, duration:0.6+Math.random()*0.8, ease:'power2.out', onComplete:function(){p.remove()} });
  }
}});
</script>
</body>
</html>
