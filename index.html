<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francisco Ortuño — Diseño Web</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js">
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050505;
  color: #fff;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  height: 400vh;
  overflow-x: hidden;
}

.scene {
  perspective: 1400px;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 0;
}

.ground-shadow {
  position: absolute;
  width: 300px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(212,175,55,.2) 0%, transparent 70%);
  bottom: 5vh;
  opacity: 0;
  filter: blur(12px);
  pointer-events: none;
}

.coin-3d {
  width: 280px;
  height: 280px;
  transform-style: preserve-3d;
  will-change: transform;
  position: absolute;
}

.coin-face {
  position: absolute;
  width: 280px;
  height: 280px;
  border-radius: 50%;
  backface-visibility: hidden;
  background-size: cover;
  background-position: center;
}

.coin-face.front {
  transform: rotateY(0deg);
}

.coin-face.back {
  transform: rotateY(180deg);
}

.coin-edge-wrap {
  position: absolute;
  width: 280px;
  height: 280px;
  transform-style: preserve-3d;
}

.coin-edge-strip {
  position: absolute;
  width: 280px;
  height: 280px;
  border-radius: 50%;
  transform: translateZ(-8px);
  background:
    repeating-linear-gradient(
      90deg,
      #5a3f08 0px,
      #8b6914 2px,
      #c9a030 3px,
      #8b6914 4px,
      #5a3f08 6px
    ),
    linear-gradient(180deg, #c9a030, #6b4f0e);
  background-blend-mode: overlay;
  border: 1px solid rgba(180,140,60,.2);
}
.coin-edge-strip-back {
  position: absolute;
  width: 280px;
  height: 280px;
  border-radius: 50%;
  transform: translateZ(8px);
  background:
    repeating-linear-gradient(
      90deg,
      #5a3f08 0px,
      #8b6914 2px,
      #c9a030 3px,
      #8b6914 4px,
      #5a3f08 6px
    ),
    linear-gradient(180deg, #c9a030, #6b4f0e);
  background-blend-mode: overlay;
  border: 1px solid rgba(180,140,60,.2);
}

.hero-text {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
  text-align: center;
  pointer-events: none;
}
.hero-title {
  font-size: clamp(2.2rem, 6vw, 5rem);
  font-weight: 800;
  letter-spacing: -.02em;
  line-height: 1.1;
}
.hero-sub {
  font-size: clamp(1rem, 2.5vw, 2rem);
  font-weight: 300;
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-top: .5rem;
  color: rgba(255,255,255,.7);
}
.hero-title .line,
.hero-sub .line {
  display: block;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
}
.hero-title .line-inner,
.hero-sub .line-inner {
  display: block;
  transform: translateY(100%);
}

.side-text {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
}
.side-text p {
  font-size: clamp(1.1rem, 2.8vw, 2.2rem);
  font-weight: 300;
  letter-spacing: .04em;
  max-width: 700px;
  text-align: center;
  padding: 0 1.5rem;
  color: rgba(255,255,255,.85);
}
.side-text .line {
  display: block;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
}
.side-text .line-inner {
  display: block;
  transform: translateY(100%);
}

.final-text {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
  text-align: center;
  pointer-events: none;
  opacity: 0;
}
.final-text h2 {
  font-size: clamp(1.6rem, 4vw, 3.5rem);
  font-weight: 700;
}
.final-text .line {
  display: block;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
}
.final-text .line-inner {
  display: block;
  transform: translateY(100%);
}

.footer {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%;
  padding: 2rem 1.5rem;
  z-index: 1;
  text-align: center;
  pointer-events: none;
  opacity: 0;
}
.footer p {
  font-size: clamp(.75rem, 1.2vw, 1rem);
  color: rgba(255,255,255,.3);
  letter-spacing: .1em;
  text-transform: uppercase;
}

.particle {
  position: fixed;
  pointer-events: none;
  z-index: 10;
  will-change: transform, opacity;
}
.particle.spark {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff 0%, #f9e27a 40%, #d4af37 100%);
  box-shadow: 0 0 8px rgba(212,175,55,.9), 0 0 20px rgba(212,175,55,.4);
}
.particle.shard {
  width: 5px; height: 8px;
  border-radius: 1px;
  background: linear-gradient(135deg, #d4af37, #8b6914);
  box-shadow: 0 0 4px rgba(212,175,55,.5);
}
</style>
</head>
<body>

<div class="scene" id="scene">
  <div class="coin-3d" id="coin">
    <div class="coin-face front" id="coinFront"></div>
    <div class="coin-edge-wrap">
      <div class="coin-edge-strip"></div>
      <div class="coin-edge-strip-back"></div>
    </div>
    <div class="coin-face back" id="coinBack"></div>
  </div>
  <div class="ground-shadow" id="groundShadow"></div>
</div>

<div class="hero-text" id="heroText">
  <h1 class="hero-title">
    <span class="line"><span class="line-inner">FRANCISCO ORTUÑO.</span></span>
  </h1>
  <p class="hero-sub">
    <span class="line"><span class="line-inner">DISEÑO WEB REVOLUCIONADO.</span></span>
  </p>
</div>

<div class="side-text" id="sideText">
  <p>
    <span class="line"><span class="line-inner">Desarrollo moderno y rendimiento extremo con Next.js</span></span>
  </p>
</div>

<div class="final-text" id="finalText">
  <h2>
    <span class="line"><span class="line-inner">Soluciones digitales que generan impacto</span></span>
  </h2>
</div>

<div class="footer" id="footer">
  <p>© 2026 Francisco Ortuño — Diseño Web</p>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

/* ─── Generar texturas realistas con Canvas ─── */
function generateCoinTexture(side) {
  const S = 560; // 2x resolución (280px * 2)
  const c = document.createElement('canvas');
  c.width = S;
  c.height = S;
  const ctx = c.getContext('2d');
  const cx = S/2, cy = S/2, R = S/2 - 4;

  // ─── degradado base dorado ───
  const grad = ctx.createRadialGradient(cx-30, cy-40, 20, cx, cy, R);
  grad.addColorStop(0, '#f9e27a');
  grad.addColorStop(0.2, '#d4af37');
  grad.addColorStop(0.5, '#b8962e');
  grad.addColorStop(0.75, '#8b6914');
  grad.addColorStop(1, '#5a3f08');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.fill();

  // ─── textura de ruido metálico ───
  const imgData = ctx.getImageData(0, 0, S, S);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const noise = (Math.random() - 0.5) * 30;
    d[i]   = Math.min(255, Math.max(0, d[i]   + noise));
    d[i+1] = Math.min(255, Math.max(0, d[i+1] + noise));
    d[i+2] = Math.min(255, Math.max(0, d[i+2] + noise * 0.6));
  }
  ctx.putImageData(imgData, 0, 0);

  // ─── anillo exterior (más claro) ───
  ctx.beginPath();
  ctx.arc(cx, cy, R-2, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(249,226,122,0.15)';
  ctx.lineWidth = 6;
  ctx.stroke();

  // ─── anillo interior del borde ───
  ctx.beginPath();
  ctx.arc(cx, cy, R-16, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(180,140,60,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // ─── puntos del borde ───
  for (let a = 0; a < Math.PI*2; a += Math.PI*2/60) {
    const px = cx + (R-12) * Math.cos(a);
    const py = cy + (R-12) * Math.sin(a);
    ctx.beginPath();
    ctx.arc(px, py, 2.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(200,170,80,0.3)';
    ctx.fill();
  }

  // ─── centro más claro ───
  const innerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R*0.45);
  innerGrad.addColorStop(0, 'rgba(249,226,122,0.08)');
  innerGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = innerGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, R*0.45, 0, Math.PI*2);
  ctx.fill();

  // ─── textura de rayado fino (brush) ───
  ctx.save();
  ctx.globalAlpha = 0.04;
  for (let i = 0; i < S; i += 3) {
    const off = Math.sin(i * 0.05) * 3;
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i + off, S);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  for (let i = 0; i < S; i += 4) {
    const off = Math.sin(i * 0.07) * 2;
    ctx.beginPath();
    ctx.moveTo(0, i);
    ctx.lineTo(S, i + off);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  ctx.restore();

  // ─── texto ───
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;
  ctx.font = 'bold 72px "Times New Roman", Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#a07820';
  if (side === 'front') {
    ctx.fillText('FO', cx, cy + 4);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,245,200,0.15)';
    ctx.fillText('FO', cx - 2, cy + 2);
  } else {
    ctx.fillText('2026', cx, cy + 4);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,245,200,0.15)';
    ctx.fillText('2026', cx - 2, cy + 2);
  }
  ctx.restore();

  // ─── highlight especular ───
  const hl = ctx.createRadialGradient(cx-80, cy-100, 10, cx-80, cy-100, 200);
  hl.addColorStop(0, 'rgba(255,248,210,0.25)');
  hl.addColorStop(0.5, 'rgba(255,248,210,0.08)');
  hl.addColorStop(1, 'transparent');
  ctx.fillStyle = hl;
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.fill();

  // ─── sombra interior (borde) ───
  const innerShadow = ctx.createRadialGradient(cx, cy, R-8, cx, cy, R);
  innerShadow.addColorStop(0, 'transparent');
  innerShadow.addColorStop(0.85, 'transparent');
  innerShadow.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = innerShadow;
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.fill();

  return c.toDataURL();
}

/* ─── Aplicar texturas a las caras ─── */
document.getElementById('coinFront').style.backgroundImage = 'url(' + generateCoinTexture('front') + ')';
document.getElementById('coinBack').style.backgroundImage = 'url(' + generateCoinTexture('back') + ')';

const coin = document.getElementById('coin');
const groundShadow = document.getElementById('groundShadow');

gsap.set(coin, {
  rotationY: 0,
  rotationX: 0,
  y: 0,
  scale: 1
});

/* ─── FASE 1: Hero reveal (0-25%) ─── */
gsap.to('.hero-title .line-inner', {
  y: 0,
  duration: 1.5,
  ease: 'power4.out',
  stagger: 0.15,
  scrollTrigger: {
    trigger: 'body',
    start: 'top top',
    end: '+=25%',
    scrub: 1.2
  }
});
gsap.to('.hero-sub .line-inner', {
  y: 0,
  duration: 1.5,
  ease: 'power4.out',
  scrollTrigger: {
    trigger: 'body',
    start: 'top top',
    end: '+=25%',
    scrub: 1.2
  }
});

/* ─── FASE 2: Caída limpia (25-70%) ─── */
// Caída con rotación suave integrada
gsap.to(coin, {
  y: '70vh',
  scale: 0.78,
  rotationX: 1080,
  rotationY: 1440,
  ease: 'power2.in',
  scrollTrigger: {
    trigger: 'body',
    start: '25% top',
    end: '75% top',
    scrub: 2
  }
});

// Hero text fade out
gsap.to('.hero-text', {
  opacity: 0,
  y: -60,
  ease: 'power2.out',
  scrollTrigger: {
    trigger: 'body',
    start: '25% top',
    end: '40% top',
    scrub: 1
  }
});

// Side text reveal
gsap.to('#sideText', {
  opacity: 1,
  scrollTrigger: {
    trigger: 'body',
    start: '35% top',
    end: '50% top',
    scrub: 1
  }
});
gsap.to('#sideText .line-inner', {
  y: 0,
  ease: 'power4.out',
  scrollTrigger: {
    trigger: 'body',
    start: '35% top',
    end: '50% top',
    scrub: 1
  }
});

/* ─── FASE 3: Impacto (70-100%) ─── */
// La moneda se aplana contra el suelo
gsap.to(coin, {
  rotationX: 85,
  rotationY: 180,
  ease: 'elastic.out(1, 0.25)',
  scrollTrigger: {
    trigger: 'body',
    start: '75% top',
    end: '92% top',
    scrub: 2
  }
});

// Sombra en el suelo
gsap.to('#groundShadow', {
  opacity: 1,
  ease: 'power2.out',
  scrollTrigger: {
    trigger: 'body',
    start: '75% top',
    end: '90% top',
    scrub: 1.5
  }
});

// Side text fade out
gsap.to('#sideText', {
  opacity: 0,
  ease: 'power2.out',
  scrollTrigger: {
    trigger: 'body',
    start: '70% top',
    end: '80% top',
    scrub: 1
  }
});

// Final text reveal
gsap.to('#finalText', {
  opacity: 1,
  scrollTrigger: {
    trigger: 'body',
    start: '82% top',
    end: '95% top',
    scrub: 1
  }
});
gsap.to('#finalText .line-inner', {
  y: 0,
  ease: 'power4.out',
  scrollTrigger: {
    trigger: 'body',
    start: '82% top',
    end: '95% top',
    scrub: 1
  }
});

// Footer aparece
gsap.to('#footer', {
  opacity: 1,
  scrollTrigger: {
    trigger: 'body',
    start: '88% top',
    end: '100% top',
    scrub: 1
  }
});

/* ─── Partículas al 75% ─── */
ScrollTrigger.create({
  trigger: 'body',
  start: '75% top',
  end: '80% top',
  scrub: 1,
  onEnter: () => spawnParticles()
});

function spawnParticles() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.78;
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle ' + (Math.random() > 0.5 ? 'spark' : 'shard');
    p.style.left = (cx + (Math.random() - 0.5) * 40) + 'px';
    p.style.top = (cy + (Math.random() - 0.5) * 20) + 'px';
    document.body.appendChild(p);

    const angle = (i / 20) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
    const dist = 60 + Math.random() * 240;
    gsap.to(p, {
      x: Math.cos(angle) * dist,
      y: Math.sin(angle) * dist - 40,
      rotation: Math.random() * 720 - 360,
      scale: 0,
      opacity: 0,
      duration: 0.6 + Math.random() * 0.8,
      ease: 'power2.out',
      onComplete: () => p.remove()
    });
  }
}
</script>
</body>
</html>
