<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francisco Ortuño — Diseño Web</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js">
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050505;
  color: #fff;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  height: 400vh;
  overflow-x: hidden;
}

/* ─── Escenario 3D ─── */
.scene {
  perspective: 1400px;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 0;
}

/* ─── Sombra en el suelo ─── */
.ground-shadow {
  position: absolute;
  width: 280px;
  height: 70px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(212,175,55,.2) 0%, transparent 70%);
  bottom: 5vh;
  opacity: 0;
  filter: blur(10px);
  pointer-events: none;
}

/* ─── Moneda ─── */
.coin-3d {
  width: 280px;
  height: 280px;
  transform-style: preserve-3d;
  will-change: transform;
  position: absolute;
}

/* ─── Cara frontal ─── */
.coin-face {
  position: absolute;
  width: 280px;
  height: 280px;
  border-radius: 50%;
  backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* textura metálica dorada con anisotropía, manchas y rayado fino */
.coin-face.front {
  background:
    /* highlight especular direccional */
    radial-gradient(ellipse 120% 80% at 25% 30%, rgba(255,248,210,.7) 0%, transparent 60%),
    radial-gradient(ellipse 80% 120% at 75% 70%, rgba(180,140,60,.3) 0%, transparent 50%),
    /* rayado metálico (brush direction) */
    repeating-linear-gradient(
      95deg,
      transparent 0px,
      rgba(255,248,200,.04) 1px,
      transparent 2px,
      transparent 6px
    ),
    /* variación de tono (manchas de acuñación) */
    radial-gradient(ellipse at 40% 60%, rgba(139,105,20,.2) 0%, transparent 40%),
    radial-gradient(ellipse at 70% 30%, rgba(90,63,8,.15) 0%, transparent 35%),
    /* degradado base metálico */
    radial-gradient(ellipse at 50% 50%, #f9e27a 0%, #d4af37 25%, #b8962e 50%, #8b6914 75%, #5a3f08 100%);
  border: 2px solid #b8962e;
  box-shadow:
    inset 0 -8px 20px rgba(0,0,0,.5),
    inset 0 8px 15px rgba(255,215,0,.2),
    0 0 50px rgba(212,175,55,.25),
    0 0 100px rgba(212,175,55,.08);
  transform: rotateY(0deg);
}

/* ─── Anillo perimetral fino (solo visual, sin relieve) ─── */
.coin-face.front .edge-ring {
  position: absolute;
  width: 266px;
  height: 266px;
  border-radius: 50%;
  border: 3px solid rgba(249,226,122,.15);
  top: 7px; left: 7px;
  background: repeating-conic-gradient(
    rgba(200,170,80,.08) 0deg,
    rgba(200,170,80,.08) 2deg,
    transparent 2deg,
    transparent 6deg
  );
  pointer-events: none;
}

/* ─── Anillo decorativo interior ─── */
.coin-face.front .inner-ring {
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: 2px solid rgba(180,140,60,.25);
  top: 40px; left: 40px;
  pointer-events: none;
}

/* ─── Círculo central de textura más fina ─── */
.coin-face.front .center-field {
  position: absolute;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background:
    repeating-linear-gradient(
      85deg,
      transparent 0px,
      rgba(255,248,200,.03) 1px,
      transparent 2px,
      transparent 5px
    ),
    radial-gradient(ellipse at 50% 50%, rgba(249,226,122,.1) 0%, transparent 70%);
  top: 60px; left: 60px;
  pointer-events: none;
}

/* ─── Iniciales (planas, sin relieve, solo textura visual) ─── */
.coin-face.front .initials {
  font-family: 'Times New Roman', Georgia, serif;
  font-size: 64px;
  font-weight: 900;
  color: #b8962e;
  z-index: 1;
  letter-spacing: 4px;
  text-shadow:
    0 0 6px rgba(139,105,20,.3),
    1px 1px 0 rgba(0,0,0,.15);
}

/* ─── Cara posterior ─── */
.coin-face.back {
  background:
    radial-gradient(ellipse 110% 70% at 70% 65%, rgba(255,248,210,.6) 0%, transparent 55%),
    radial-gradient(ellipse 70% 110% at 30% 35%, rgba(180,140,60,.3) 0%, transparent 45%),
    repeating-linear-gradient(
      85deg,
      transparent 0px,
      rgba(255,248,200,.04) 1px,
      transparent 2px,
      transparent 6px
    ),
    radial-gradient(ellipse at 60% 40%, rgba(139,105,20,.2) 0%, transparent 40%),
    radial-gradient(ellipse at 30% 70%, rgba(90,63,8,.15) 0%, transparent 35%),
    radial-gradient(ellipse at 50% 50%, #f9e27a 0%, #d4af37 25%, #b8962e 50%, #8b6914 75%, #5a3f08 100%);
  border: 2px solid #b8962e;
  box-shadow:
    inset 0 -8px 20px rgba(0,0,0,.5),
    inset 0 8px 15px rgba(255,215,0,.2),
    0 0 50px rgba(212,175,55,.25);
  transform: rotateY(180deg);
}

.coin-face.back .edge-ring {
  position: absolute;
  width: 266px;
  height: 266px;
  border-radius: 50%;
  border: 3px solid rgba(249,226,122,.15);
  top: 7px; left: 7px;
  background: repeating-conic-gradient(
    rgba(200,170,80,.08) 0deg,
    rgba(200,170,80,.08) 2deg,
    transparent 2deg,
    transparent 6deg
  );
  pointer-events: none;
}

.coin-face.back .inner-ring {
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: 2px solid rgba(180,140,60,.25);
  top: 40px; left: 40px;
  pointer-events: none;
}

.coin-face.back .center-field {
  position: absolute;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background:
    repeating-linear-gradient(
      95deg,
      transparent 0px,
      rgba(255,248,200,.03) 1px,
      transparent 2px,
      transparent 5px
    ),
    radial-gradient(ellipse at 50% 50%, rgba(249,226,122,.1) 0%, transparent 70%);
  top: 60px; left: 60px;
  pointer-events: none;
}

.coin-face.back .year {
  font-family: 'Times New Roman', Georgia, serif;
  font-size: 38px;
  font-weight: 700;
  color: #b8962e;
  z-index: 1;
  text-shadow:
    0 0 6px rgba(139,105,20,.3),
    1px 1px 0 rgba(0,0,0,.15);
}

/* ─── Canto: una sola banda con textura de estriado ─── */
.coin-edge-strip {
  position: absolute;
  width: 280px;
  height: 280px;
  border-radius: 50%;
  transform-style: preserve-3d;
  transform: translateZ(-10px);
  background:
    repeating-linear-gradient(
      90deg,
      #5a3f08 0px,
      #8b6914 2px,
      #c9a030 3px,
      #8b6914 4px,
      #5a3f08 6px
    ),
    linear-gradient(180deg, #c9a030, #6b4f0e);
  background-blend-mode: overlay;
  border: 1px solid rgba(180,140,60,.2);
  outline: 2px solid rgba(90,63,8,.3);
}
.coin-edge-strip-back {
  position: absolute;
  width: 280px;
  height: 280px;
  border-radius: 50%;
  transform-style: preserve-3d;
  transform: translateZ(10px);
  background:
    repeating-linear-gradient(
      90deg,
      #5a3f08 0px,
      #8b6914 2px,
      #c9a030 3px,
      #8b6914 4px,
      #5a3f08 6px
    ),
    linear-gradient(180deg, #c9a030, #6b4f0e);
  background-blend-mode: overlay;
  border: 1px solid rgba(180,140,60,.2);
  outline: 2px solid rgba(90,63,8,.3);
}

/* ─── Hero text ─── */
.hero-text {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
  text-align: center;
  pointer-events: none;
}
.hero-title {
  font-size: clamp(2.2rem, 6vw, 5rem);
  font-weight: 800;
  letter-spacing: -.02em;
  line-height: 1.1;
}
.hero-sub {
  font-size: clamp(1rem, 2.5vw, 2rem);
  font-weight: 300;
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-top: .5rem;
  color: rgba(255,255,255,.7);
}
.hero-title .line,
.hero-sub .line {
  display: block;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
}
.hero-title .line-inner,
.hero-sub .line-inner {
  display: block;
  transform: translateY(100%);
}

/* ─── Side text ─── */
.side-text {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
}
.side-text p {
  font-size: clamp(1.1rem, 2.8vw, 2.2rem);
  font-weight: 300;
  letter-spacing: .04em;
  max-width: 700px;
  text-align: center;
  padding: 0 1.5rem;
  color: rgba(255,255,255,.85);
}
.side-text .line {
  display: block;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
}
.side-text .line-inner {
  display: block;
  transform: translateY(100%);
}

/* ─── Final text ─── */
.final-text {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
  text-align: center;
  pointer-events: none;
  opacity: 0;
}
.final-text h2 {
  font-size: clamp(1.6rem, 4vw, 3.5rem);
  font-weight: 700;
}
.final-text .line {
  display: block;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
}
.final-text .line-inner {
  display: block;
  transform: translateY(100%);
}

/* ─── Footer ─── */
.footer {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%;
  padding: 2rem 1.5rem;
  z-index: 1;
  text-align: center;
  pointer-events: none;
  opacity: 0;
}
.footer p {
  font-size: clamp(.75rem, 1.2vw, 1rem);
  color: rgba(255,255,255,.3);
  letter-spacing: .1em;
  text-transform: uppercase;
}

/* ─── Partículas ─── */
.particle {
  position: fixed;
  pointer-events: none;
  z-index: 10;
  will-change: transform, opacity;
}
.particle.spark {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff 0%, #f9e27a 40%, #d4af37 100%);
  box-shadow: 0 0 8px rgba(212,175,55,.9), 0 0 20px rgba(212,175,55,.4);
}
.particle.shard {
  width: 5px; height: 8px;
  border-radius: 1px;
  background: linear-gradient(135deg, #d4af37, #8b6914);
  box-shadow: 0 0 4px rgba(212,175,55,.5);
}
</style>
</head>
<body>

<div class="scene" id="scene">
  <div class="coin-3d" id="coin">
    <div class="coin-face front">
      <div class="edge-ring"></div>
      <div class="inner-ring"></div>
      <div class="center-field"></div>
      <span class="initials">FO</span>
    </div>
    <div class="coin-edge-strip" id="edgeFront"></div>
    <div class="coin-edge-strip-back" id="edgeBack"></div>
    <div class="coin-face back">
      <div class="edge-ring"></div>
      <div class="inner-ring"></div>
      <div class="center-field"></div>
      <span class="year">2026</span>
    </div>
  </div>
  <div class="ground-shadow" id="groundShadow"></div>
</div>

<div class="hero-text" id="heroText">
  <h1 class="hero-title">
    <span class="line"><span class="line-inner">FRANCISCO ORTUÑO.</span></span>
  </h1>
  <p class="hero-sub">
    <span class="line"><span class="line-inner">DISEÑO WEB REVOLUCIONADO.</span></span>
  </p>
</div>

<div class="side-text" id="sideText">
  <p>
    <span class="line"><span class="line-inner">Desarrollo moderno y rendimiento extremo con Next.js</span></span>
  </p>
</div>

<div class="final-text" id="finalText">
  <h2>
    <span class="line"><span class="line-inner">Soluciones digitales que generan impacto</span></span>
  </h2>
</div>

<div class="footer" id="footer">
  <p>© 2026 Francisco Ortuño — Diseño Web</p>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

const coin = document.getElementById('coin');
const groundShadow = document.getElementById('groundShadow');

/* ─── Estado inicial: moneda centrada, quieta, sin giro ─── */
gsap.set(coin, {
  rotationY: 0,
  rotationX: 0,
  y: 0,
  scale: 1
});

/* ─── FASE 1: Hero reveal (0-25%) ─── */
// El texto del hero se revela con clip-path mientras la moneda flota detrás, estática
gsap.to('.hero-title .line-inner', {
  y: 0,
  duration: 1.5,
  ease: 'power4.out',
  stagger: 0.15,
  scrollTrigger: {
    trigger: 'body',
    start: 'top top',
    end: '+=25%',
    scrub: 1.2
  }
});
gsap.to('.hero-sub .line-inner', {
  y: 0,
  duration: 1.5,
  ease: 'power4.out',
  scrollTrigger: {
    trigger: 'body',
    start: 'top top',
    end: '+=25%',
    scrub: 1.2
  }
});

/* ─── FASE 2: Caída de la moneda (25-70%) ─── */
// La moneda cae por gravedad con tambaleo realista
// Tramo 1: empieza a caer, giro rápido
gsap.to(coin, {
  y: '20vh',
  rotationX: 720,
  rotationY: 540,
  scale: 0.92,
  ease: 'power1.in',
  scrollTrigger: {
    trigger: 'body',
    start: '25% top',
    end: '40% top',
    scrub: 1.5
  }
});

// Tramo 2: cambia dirección de giro (tambaleo natural)
gsap.to(coin, {
  y: '38vh',
  rotationX: -480,
  rotationY: 900,
  scale: 0.87,
  ease: 'power2.in',
  scrollTrigger: {
    trigger: 'body',
    start: '40% top',
    end: '55% top',
    scrub: 1.5
  }
});

// Tramo 3: se acerca al suelo, se estabiliza el giro
gsap.to(coin, {
  y: '55vh',
  rotationX: 120,
  rotationY: 1260,
  scale: 0.83,
  ease: 'power3.in',
  scrollTrigger: {
    trigger: 'body',
    start: '55% top',
    end: '70% top',
    scrub: 1.5
  }
});

// Hero text fade out + subir
gsap.to('.hero-text', {
  opacity: 0,
  y: -60,
  ease: 'power2.out',
  scrollTrigger: {
    trigger: 'body',
    start: '25% top',
    end: '40% top',
    scrub: 1
  }
});

// Side text reveal
gsap.to('#sideText', {
  opacity: 1,
  scrollTrigger: {
    trigger: 'body',
    start: '35% top',
    end: '50% top',
    scrub: 1
  }
});
gsap.to('#sideText .line-inner', {
  y: 0,
  ease: 'power4.out',
  scrollTrigger: {
    trigger: 'body',
    start: '35% top',
    end: '50% top',
    scrub: 1
  }
});

/* ─── FASE 3: Impacto y caída al suelo (70-100%) ─── */
// La moneda cae hasta abajo del todo como si cayera al suelo
gsap.to(coin, {
  y: '72vh',
  scale: 0.78,
  ease: 'elastic.out(1, 0.3)',
  scrollTrigger: {
    trigger: 'body',
    start: '70% top',
    end: '85% top',
    scrub: 1.5
  }
});

// Se aplana contra el suelo
gsap.to(coin, {
  rotationX: 85,
  rotationY: 360,
  ease: 'elastic.out(0.8, 0.25)',
  scrollTrigger: {
    trigger: 'body',
    start: '78% top',
    end: '92% top',
    scrub: 2
  }
});

// Sombra en el suelo aparece
gsap.to('#groundShadow', {
  opacity: 1,
  scrollTrigger: {
    trigger: 'body',
    start: '78% top',
    end: '90% top',
    scrub: 1.5
  }
});

// Side text fade out
gsap.to('#sideText', {
  opacity: 0,
  ease: 'power2.out',
  scrollTrigger: {
    trigger: 'body',
    start: '70% top',
    end: '80% top',
    scrub: 1
  }
});

// Final text reveal
gsap.to('#finalText', {
  opacity: 1,
  scrollTrigger: {
    trigger: 'body',
    start: '82% top',
    end: '95% top',
    scrub: 1
  }
});
gsap.to('#finalText .line-inner', {
  y: 0,
  ease: 'power4.out',
  scrollTrigger: {
    trigger: 'body',
    start: '82% top',
    end: '95% top',
    scrub: 1
  }
});

// Footer aparece
gsap.to('#footer', {
  opacity: 1,
  scrollTrigger: {
    trigger: 'body',
    start: '88% top',
    end: '100% top',
    scrub: 1
  }
});

/* ─── Partículas de impacto al 70% ─── */
ScrollTrigger.create({
  trigger: 'body',
  start: '70% top',
  end: '75% top',
  scrub: 1,
  onEnter: () => spawnParticles()
});

function spawnParticles() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.74;
  const types = ['spark', 'shard'];

  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    const type = types[Math.floor(Math.random() * types.length)];
    p.className = 'particle ' + type;
    p.style.left = (cx + (Math.random() - 0.5) * 40) + 'px';
    p.style.top = (cy + (Math.random() - 0.5) * 25) + 'px';
    document.body.appendChild(p);

    const angle = (i / 24) * Math.PI * 2 + (Math.random() - 0.5) * 0.6;
    const dist = 50 + Math.random() * 250;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 50;

    gsap.to(p, {
      x: dx,
      y: dy,
      rotation: Math.random() * 720 - 360,
      scale: 0,
      opacity: 0,
      duration: 0.6 + Math.random() * 0.9,
      ease: 'power2.out',
      onComplete: () => p.remove()
    });
  }
}
</script>
</body>
</html>
