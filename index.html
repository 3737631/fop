<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francisco Ortuño &mdash; Diseño Web</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js">
</script>
<script src="https://d3js.org/d3.v7.min.js">
</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&amp;family=Teko:wght@600;700&amp;display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e8e2d9;font-family:'Inter','Segoe UI',system-ui,sans-serif;height:700vh;overflow-x:hidden}

nav{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;pointer-events:auto}
.nav-inner{position:relative;display:flex;border-radius:9999px;border:1px solid rgba(200,191,173,.15);background:rgba(0,0,0,.7);backdrop-filter:blur(8px);padding:2px}
.nav-item{position:relative;z-index:10;display:block;cursor:pointer;padding:4px 12px;font-size:9px;text-transform:uppercase;letter-spacing:.15em;mix-blend-mode:difference}
@media(min-width:768px){.nav-item{padding:6px 18px;font-size:11px}}
.nav-cursor{position:absolute;z-index:0;height:22px;border-radius:9999px;background:rgba(200,191,173,.85);pointer-events:none}
@media(min-width:768px){.nav-cursor{height:30px}}

.scene{perspective:1400px;position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:2}

#globeCanvas{width:380px;height:380px;border-radius:50%;will-change:transform,clip-path;display:block;position:absolute;z-index:3;clip-path:inset(0);cursor:grab}
#globeCanvas:active{cursor:grabbing}

.ground-shadow-globe{position:absolute;width:300px;height:70px;border-radius:50%;background:radial-gradient(ellipse,rgba(200,191,173,.12) 0%,transparent 70%);bottom:5vh;opacity:0;filter:blur(14px);pointer-events:none;z-index:1}
.ground-shadow-coin{position:absolute;width:300px;height:70px;border-radius:50%;background:radial-gradient(ellipse,rgba(200,191,173,.18) 0%,transparent 70%);bottom:5vh;opacity:0;filter:blur(12px);pointer-events:none;z-index:1}

.coin-3d{width:300px;height:300px;transform-style:preserve-3d;will-change:transform;position:absolute;z-index:2;opacity:0}
.coin-face{position:absolute;width:300px;height:300px;border-radius:50%;backface-visibility:hidden;background-size:cover;background-position:center}
.coin-face.front{box-shadow:inset 0 -4px 12px rgba(0,0,0,.5),inset 0 4px 8px rgba(255,255,255,.06),0 0 0 4px #141414,0 0 0 8px #0a0a0a;transform:translateZ(-5px)}
.coin-face.back{box-shadow:inset 0 -4px 12px rgba(0,0,0,.5),inset 0 4px 8px rgba(255,255,255,.06),0 0 0 4px #141414,0 0 0 8px #0a0a0a;transform:translateZ(5px) rotateY(180deg)}

.hero{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;z-index:3;pointer-events:none;padding:0 6vw}
.hero .line{display:block;clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}
.hero .line-inner{display:block;transform:translateY(100%)}
.hero-name{font-family:'Inter','Segoe UI',sans-serif;font-size:clamp(2.5rem,6vw,5rem);font-weight:100;font-stretch:condensed;color:#e8e2d9;line-height:1.1;letter-spacing:-.01em}
.hero-name em{font-style:italic;font-weight:400;color:#c8bfad}
.hero-role{font-family:'Inter','Segoe UI',sans-serif;font-size:clamp(.75rem,1.4vw,1.1rem);font-weight:100;font-stretch:condensed;color:rgba(200,191,173,.6);letter-spacing:.35em;text-transform:uppercase;margin-top:.6rem}

.bg-text{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:0;pointer-events:none;opacity:0}
.bg-text .line{display:block;clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}
.bg-text .line-inner{display:block;transform:translateY(100%)}
.bg-text-title{font-family:'Inter','Segoe UI',sans-serif;font-size:clamp(2rem,5vw,4rem);font-weight:100;font-stretch:expanded;color:#e8e2d9;line-height:1.2;letter-spacing:-.01em;text-align:center}
.bg-text-title em{font-style:italic;font-weight:400;color:#c8bfad}
.bg-text-sub{font-family:'Inter','Segoe UI',sans-serif;font-size:clamp(.65rem,1.3vw,1rem);font-weight:400;font-stretch:condensed;color:rgba(200,191,173,.5);letter-spacing:.35em;text-transform:uppercase;margin-top:.6rem;text-align:center}

.story-section{position:fixed;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none;opacity:0;overflow:hidden}
.story-panel{position:absolute;top:0;height:100%;display:flex;align-items:center;justify-content:center}
.story-panel.p1{left:-18%;width:48%;background:#B91C1C;filter:blur(5px);opacity:.7}
.story-panel.p2{left:18%;width:64%;background:#FFD700;box-shadow:0 0 80px rgba(0,0,0,.25),0 0 30px rgba(0,0,0,.1);z-index:2}
.story-panel.p3{left:70%;width:48%;background:#047857;filter:blur(5px);opacity:.7}
.story-num{font-family:'Teko','Impact','Arial Black',sans-serif;font-weight:700;font-size:clamp(14rem,50vw,60vh);line-height:1;letter-spacing:-.04em;text-transform:uppercase;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.story-panel.p1 .story-num{color:#fff}
.story-panel.p2 .story-num{color:#000}
.story-panel.p3 .story-num{color:#fff}
.story-nav{position:absolute;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:clamp(6px,1.2vw,18px);z-index:7;white-space:nowrap;font-family:'Inter','Segoe UI',sans-serif;font-size:clamp(5px,.65vw,9px);font-weight:500;color:#000;letter-spacing:.15em;text-transform:uppercase;opacity:.6}
.story-body{position:absolute;bottom:clamp(3vh,5vh,7vh);right:clamp(2vw,4vw,5vw);z-index:7;font-family:'Inter','Helvetica','Segoe UI',sans-serif;font-size:clamp(.45rem,.85vw,.8rem);font-weight:400;color:#000;letter-spacing:.04em;text-align:right;max-width:clamp(100px,22vw,300px);line-height:1.4;opacity:.75}
.story-dots{position:absolute;bottom:clamp(2vh,3.5vh,5vh);left:50%;transform:translateX(-50%);display:flex;gap:clamp(6px,.8vw,12px);z-index:8}
.story-dot{width:clamp(5px,.6vw,9px);height:clamp(5px,.6vw,9px);border-radius:50%;background:#fff;opacity:.25}
.story-dot.active{opacity:.9;background:#fff;width:clamp(12px,1.2vw,20px);border-radius:4px}
.story-dot.active.d2{background:#000;opacity:.9}
.story-dot.d2{border:1px solid #000;background:transparent;opacity:.4}

.particle{position:fixed;pointer-events:none;z-index:10;will-change:transform,opacity}
.particle.spark{width:5px;height:5px;border-radius:50%;background:radial-gradient(circle,#c8bfad,#a09888);box-shadow:0 0 8px rgba(200,191,173,.5)}
.particle.shard{width:4px;height:7px;border-radius:1px;background:linear-gradient(135deg,#c8bfad,#80786a);box-shadow:0 0 4px rgba(200,191,173,.3)}
</style>
</head>
<body>

<nav>
  <div class="nav-inner" id="navInner">
    <div class="nav-cursor" id="navCursor"></div>
    <span class="nav-item">Home</span>
    <span class="nav-item">Pricing</span>
    <span class="nav-item">About</span>
    <span class="nav-item">Services</span>
    <span class="nav-item">Contact</span>
  </div>
</nav>

<div class="scene" id="scene">
  <canvas id="globeCanvas"></canvas>
  <div class="coin-3d" id="coin">
    <div class="coin-face front" id="coinFront"></div>
    <div class="coin-face back" id="coinBack"></div>
  </div>
  <div class="ground-shadow-globe" id="groundShadowGlobe"></div>
  <div class="ground-shadow-coin" id="groundShadowCoin"></div>
</div>

<div class="hero" id="heroSection">
  <div class="hero-name">
    <span class="line"><span class="line-inner">Francisco</span></span>
    <span class="line"><span class="line-inner"><em>Ortu&ntilde;o</em></span></span>
  </div>
  <div class="hero-role">
    <span class="line"><span class="line-inner">dise&ntilde;ador web</span></span>
  </div>
</div>

<div class="bg-text" id="bgText">
  <div class="bg-text-title">
    <span class="line"><span class="line-inner">Dise&ntilde;a a tu</span></span>
    <span class="line"><span class="line-inner"><em>gusto</em></span></span>
  </div>
  <div class="bg-text-sub">
    <span class="line"><span class="line-inner">m&aacute;s de 35 proyectos</span></span>
  </div>
</div>

<div class="story-section" id="storySection">
  <div class="story-panel p1">
    <div class="story-num">1</div>
  </div>
  <div class="story-panel p2">
    <div class="story-nav">HOME &nbsp; PRICING &nbsp; ABOUT &nbsp; SERVICES &nbsp; CONTACT</div>
    <div class="story-num">2</div>
    <div class="story-body">We are colorful,<br>we believe in great design.</div>
  </div>
  <div class="story-panel p3">
    <div class="story-num">3</div>
  </div>
  <div class="story-dots">
    <div class="story-dot"></div>
    <div class="story-dot active d2"></div>
    <div class="story-dot"></div>
  </div>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

var navItems = document.querySelectorAll('.nav-item');
var navCursor = document.getElementById('navCursor');
var navInner = document.getElementById('navInner');
navItems.forEach(function(item, i) {
  item.addEventListener('mouseenter', function() {
    var rect = this.getBoundingClientRect();
    var pr = navInner.getBoundingClientRect();
    gsap.to(navCursor, { left: rect.left - pr.left, width: rect.width, opacity: 1, duration: 0.45, ease:'power3.out' });
  });
  item.addEventListener('click', function() {
    var p = [0, 0.25, 0.45, 0.65, 0.85];
    window.scrollTo({ top: p[i] * document.body.scrollHeight, behavior: 'smooth' });
  });
});
navInner.addEventListener('mouseleave', function() { gsap.to(navCursor, { opacity: 0, duration: 0.35 }); });
gsap.set(navCursor, { opacity:0 });

var canvas = document.getElementById('globeCanvas');
var ctx = canvas.getContext('2d');
var W = 380, H = 380, R = 160;
var dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr; canvas.height = H * dpr;
canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
ctx.scale(dpr, dpr);

var projection = d3.geoOrthographic().scale(R).translate([W/2, H/2]).clipAngle(90);
var path = d3.geoPath().projection(projection).context(ctx);
var graticule = d3.geoGraticule();
var landFeatures = null;
var allDots = [];
var rotation = [0, 0];
var autoRotate = true;

function pointInPolygon(px, py, polygon) {
  var inside = false;
  for (var i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    var xi = polygon[i][0], yi = polygon[i][1];
    var xj = polygon[j][0], yj = polygon[j][1];
    if (yi > py !== yj > py && px < ((xj - xi) * (py - yi)) / (yj - yi) + xi) inside = !inside;
  }
  return inside;
}
function pointInFeature(lng, lat, feature) {
  var geom = feature.geometry;
  if (geom.type === 'Polygon') {
    if (!pointInPolygon(lng, lat, geom.coordinates[0])) return false;
    for (var i = 1; i < geom.coordinates.length; i++) { if (pointInPolygon(lng, lat, geom.coordinates[i])) return false; }
    return true;
  } else if (geom.type === 'MultiPolygon') {
    for (var p = 0; p < geom.coordinates.length; p++) {
      var poly = geom.coordinates[p];
      if (pointInPolygon(lng, lat, poly[0])) {
        var inHole = false;
        for (var h = 1; h < poly.length; h++) { if (pointInPolygon(lng, lat, poly[h])) { inHole = true; break; } }
        if (!inHole) return true;
      }
    }
  }
  return false;
}
function generateDots(feature, spacing) {
  var dots = [], step = spacing * 0.08;
  var bounds = d3.geoBounds(feature);
  for (var lng = bounds[0][0]; lng <= bounds[1][0]; lng += step) {
    for (var lat = bounds[0][1]; lat <= bounds[1][1]; lat += step) {
      if (pointInFeature(lng, lat, feature)) dots.push([lng, lat]);
    }
  }
  return dots;
}
function renderGlobe() {
  ctx.clearRect(0, 0, W, H);
  var s = projection.scale();
  ctx.beginPath(); ctx.arc(W/2, H/2, s, 0, Math.PI*2); ctx.fillStyle = '#0d0d0d'; ctx.fill();
  ctx.beginPath(); ctx.arc(W/2, H/2, s, 0, Math.PI*2); ctx.strokeStyle = 'rgba(200,191,173,0.15)'; ctx.lineWidth = 1.5; ctx.stroke();
  if (landFeatures) {
    ctx.beginPath(); path(graticule()); ctx.strokeStyle = 'rgba(200,191,173,0.08)'; ctx.lineWidth = 0.5; ctx.stroke();
    ctx.beginPath(); landFeatures.features.forEach(function(f) { path(f); }); ctx.strokeStyle = 'rgba(200,191,173,0.25)'; ctx.lineWidth = 0.8; ctx.stroke();
    var sf = s / R;
    for (var i = 0; i < allDots.length; i++) {
      var p = projection([allDots[i][0], allDots[i][1]]);
      if (p && p[0] >= 0 && p[0] <= W && p[1] >= 0 && p[1] <= H) {
        ctx.beginPath(); ctx.arc(p[0], p[1], 1 * sf, 0, Math.PI*2); ctx.fillStyle = 'rgba(200,191,173,0.4)'; ctx.fill();
      }
    }
  }
}
function generateMapTexture() {
  var c = document.createElement('canvas');
  c.width = 600; c.height = 600;
  var cx = c.getContext('2d');
  var pr = d3.geoOrthographic().scale(260).translate([300, 300]).clipAngle(90);
  var pa = d3.geoPath().projection(pr).context(cx);
  var g = cx.createRadialGradient(180, 180, 20, 300, 300, 260);
  g.addColorStop(0, '#151515'); g.addColorStop(0.4, '#0d0d0d'); g.addColorStop(1, '#080808');
  cx.beginPath(); cx.arc(300, 300, 260, 0, Math.PI*2); cx.fillStyle = g; cx.fill();
  cx.beginPath(); cx.arc(300, 300, 258, 0, Math.PI*2); cx.strokeStyle = 'rgba(200,191,173,0.2)'; cx.lineWidth = 2; cx.stroke();
  if (landFeatures) {
    var gr = d3.geoGraticule();
    cx.beginPath(); pa(gr()); cx.strokeStyle = 'rgba(200,191,173,0.08)'; cx.lineWidth = 0.5; cx.stroke();
    cx.beginPath(); landFeatures.features.forEach(function(f) { pa(f); }); cx.strokeStyle = 'rgba(200,191,173,0.2)'; cx.lineWidth = 1; cx.stroke();
    cx.beginPath(); landFeatures.features.forEach(function(f) { pa(f); }); cx.fillStyle = 'rgba(200,191,173,0.08)'; cx.fill();
    var dots = [];
    landFeatures.features.forEach(function(f) { var d = generateDots(f, 20); d.forEach(function(x) { dots.push(x); }); });
    for (var i = 0; i < dots.length; i++) {
      var p = pr([dots[i][0], dots[i][1]]);
      if (p && p[0] >= 0 && p[0] <= 600 && p[1] >= 0 && p[1] <= 600) {
        cx.beginPath(); cx.arc(p[0], p[1], 1.5, 0, Math.PI*2); cx.fillStyle = 'rgba(200,191,173,0.3)'; cx.fill();
      }
    }
  }
  return c.toDataURL();
}
function tick() { if (autoRotate) { rotation[0] += 0.15; projection.rotate(rotation); renderGlobe(); } requestAnimationFrame(tick); }

fetch('https://raw.githubusercontent.com/martynafford/natural-earth-geojson/refs/heads/master/110m/physical/ne_110m_land.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    landFeatures = data;
    landFeatures.features.forEach(function(f) { var dots = generateDots(f, 16); dots.forEach(function(d) { allDots.push(d); }); });
    renderGlobe();
    var tex = generateMapTexture();
    document.getElementById('coinFront').style.backgroundImage = 'url(' + tex + ')';
    document.getElementById('coinBack').style.backgroundImage = 'url(' + tex + ')';
  });
tick();

var isDragging = false, dragStartX, dragStartY, dragStartRot = [0, 0];
canvas.addEventListener('mousedown', function(e) { isDragging = true; autoRotate = false; dragStartX = e.clientX; dragStartY = e.clientY; dragStartRot = [rotation[0], rotation[1]]; });
document.addEventListener('mousemove', function(e) { if (!isDragging) return; rotation[0] = dragStartRot[0] + (e.clientX - dragStartX) * 0.5; rotation[1] = dragStartRot[1] - (e.clientY - dragStartY) * 0.5; rotation[1] = Math.max(-90, Math.min(90, rotation[1])); projection.rotate(rotation); renderGlobe(); });
document.addEventListener('mouseup', function() { isDragging = false; setTimeout(function() { autoRotate = true; }, 2000); });

var coin = document.getElementById('coin');
var gsGlobe = document.getElementById('groundShadowGlobe');
var gsCoin = document.getElementById('groundShadowCoin');
var heroS = document.getElementById('heroSection');
var storySec = document.getElementById('storySection');

gsap.set(coin, { opacity:0, y:0, scale:1, rotationY:0, rotationX:0 });
gsap.set(canvas, { x:0, y:0, scale:1, clipPath:'inset(0)', opacity:0.6 });
gsap.set(storySec, { opacity:0 });

gsap.to('.hero .line-inner', { y:0, duration:1.5, ease:'power4.out', stagger:0.1, scrollTrigger:{ trigger:'body', start:'top top', end:'+=12%', scrub:1.2 } });
gsap.to(canvas, { x:'2vw', opacity:1, ease:'power4.out', scrollTrigger:{ trigger:'body', start:'top top', end:'+=12%', scrub:1.2 } });

gsap.to('#bgText', { opacity:1, duration:1.5, ease:'power4.out', scrollTrigger:{ trigger:'body', start:'6% top', end:'12% top', scrub:1.2 } });
gsap.to('#bgText .line-inner', { y:0, duration:1.5, ease:'power4.out', stagger:0.08, scrollTrigger:{ trigger:'body', start:'6% top', end:'12% top', scrub:1.2 } });
gsap.to(heroS, { opacity:0, x:-160, filter:'blur(12px)', ease:'power4.out', scrollTrigger:{ trigger:'body', start:'8% top', end:'16% top', scrub:1.2 } });

gsap.to(canvas, { clipPath:'inset(0 0 100% 0)', ease:'power3.inOut', scrollTrigger:{ trigger:'body', start:'14% top', end:'26% top', scrub:1.8 } });
gsap.to(coin, { opacity:1, scale:1, ease:'power3.inOut', scrollTrigger:{ trigger:'body', start:'20% top', end:'30% top', scrub:1.4 } });
gsap.to(canvas, { scale:0.6, opacity:0.2, ease:'power3.inOut', scrollTrigger:{ trigger:'body', start:'20% top', end:'30% top', scrub:1.4 } });

gsap.to(coin, { y:'55vh', scale:0.65, rotationX:1260, rotationY:1800, ease:'power1.in', scrollTrigger:{ trigger:'body', start:'30% top', end:'52% top', scrub:2.5 } });
gsap.to(canvas, { opacity:0, ease:'power3.out', scrollTrigger:{ trigger:'body', start:'26% top', end:'36% top', scrub:1 } });
gsap.to(gsGlobe, { opacity:0.6, ease:'power4.out', scrollTrigger:{ trigger:'body', start:'8% top', end:'20% top', scrub:1 } });
gsap.to(gsGlobe, { opacity:0, ease:'power4.out', scrollTrigger:{ trigger:'body', start:'26% top', end:'36% top', scrub:1 } });

gsap.to(coin, { rotationX:85, rotationY:360, ease:'elastic.out(1,0.25)', scrollTrigger:{ trigger:'body', start:'52% top', end:'60% top', scrub:2 } });
gsap.to(gsCoin, { opacity:0.7, ease:'power4.out', scrollTrigger:{ trigger:'body', start:'52% top', end:'60% top', scrub:1.5 } });
gsap.to('#bgText', { opacity:0, y:-30, filter:'blur(8px)', ease:'power4.out', scrollTrigger:{ trigger:'body', start:'56% top', end:'64% top', scrub:1 } });

gsap.to(coin, { opacity:0, scale:0.2, ease:'power4.out', scrollTrigger:{ trigger:'body', start:'62% top', end:'68% top', scrub:1.5 } });
gsap.to(gsCoin, { opacity:0, ease:'power4.out', scrollTrigger:{ trigger:'body', start:'62% top', end:'68% top', scrub:1.5 } });

gsap.to(storySec, { opacity:1, ease:'power4.out', scrollTrigger:{ trigger:'body', start:'65% top', end:'70% top', scrub:1.5 } });

ScrollTrigger.create({ trigger:'body', start:'52% top', end:'56% top', scrub:1, onEnter:function(){
  var cx=window.innerWidth/2, cy=window.innerHeight*0.82;
  for(var i=0;i<20;i++){
    var p=document.createElement('div');
    p.className='particle '+(Math.random()>0.5?'spark':'shard');
    p.style.left=(cx+(Math.random()-0.5)*40)+'px';
    p.style.top=(cy+(Math.random()-0.5)*20)+'px';
    document.body.appendChild(p);
    var a=(i/20)*Math.PI*2+(Math.random()-0.5)*0.5;
    var d=60+Math.random()*250;
    gsap.to(p,{ x:Math.cos(a)*d, y:Math.sin(a)*d-40, rotation:Math.random()*720-360, scale:0, opacity:0, duration:0.6+Math.random()*0.8, ease:'power2.out', onComplete:function(){p.remove()} });
  }
}});
</script>
</body>
</html>
